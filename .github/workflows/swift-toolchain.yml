env:
  PINNED_BOOTSTRAP_TOOLCHAIN_VERSION: DEVELOPMENT-SNAPSHOT-2026-03-16-a

defaults:
  run:
    shell: pwsh

permissions:
  id-token: write
  attestations: write

jobs:
  stage0-sqlite:
    runs-on: ${{ inputs.default_build_runner }}

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(inputs.build_matrix) }}

    name: ${{ matrix.os }} ${{ matrix.arch }} Stage0 SQLite3

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          ref: ${{ inputs.ci_build_revision }}
          path: ${{ github.workspace }}/SourceCache/ci-build
          show-progress: false
      - uses: ./SourceCache/ci-build/.github/actions/setup-build
        with:
          setup-vs-dev-env: true
          host-arch: ${{ matrix.arch }}
          swift-version: ${{ env.PINNED_BOOTSTRAP_TOOLCHAIN_VERSION }}

      - name: Compute workspace hash
        id: workspace_hash
        run: |
          $stringAsStream = [System.IO.MemoryStream]::new()
          $writer = [System.IO.StreamWriter]::new($stringAsStream)
          $writer.write("${{ github.workspace }}")
          $writer.Flush()
          $stringAsStream.Position = 0
          $hash = (Get-FileHash -Algorithm SHA256 -InputStream $stringAsStream).Hash
          echo "hash=$hash" >> $env:GITHUB_OUTPUT
      - name: Setup sccache
        uses: ./SourceCache/ci-build/.github/actions/setup-sccache
        if: inputs.use_host_toolchain
        with:
          s3-bucket: ${{ vars.SCCACHE_S3_BUCKET }}
          aws-region: ${{ vars.SCCACHE_AWS_REGION }}
          aws-arn: ${{ vars.SCCACHE_AWS_ARN }}
          disk-max-size: 100M
          disk-cache-key: ${{ steps.workspace_hash.outputs.hash }}-${{ matrix.os }}-${{ matrix.arch }}-stage0-sqlite

      - name: Restore CAS
        uses: ./SourceCache/ci-build/.github/actions/restore-cas
        if: ${{ !inputs.use_host_toolchain }}
        with:
          s3-bucket: ${{ vars.SCCACHE_S3_BUCKET }}
          aws-region: ${{ vars.SCCACHE_AWS_REGION }}
          aws-arn: ${{ vars.SCCACHE_AWS_ARN }}
          cache-key: ${{ matrix.os }}-${{ matrix.arch }}-stage0-sqlite

      - uses: actions/checkout@v4.2.2
        with:
          repository: swiftlang/swift-toolchain-sqlite
          ref: ${{ inputs.swift_toolchain_sqlite_revision }}
          path: ${{ github.workspace }}/SourceCache/swift-toolchain-sqlite
          show-progress: false

      # build.ps1: Build-SQLite
      - name: Configure SQLite
        uses: ./SourceCache/ci-build/.github/actions/configure-cmake-project
        with:
          project-name: Stage0 SQLite
          swift-version: ${{ inputs.swift_version }}
          enable-caching: ${{ inputs.use_host_toolchain }}
          enable-cas: ${{ !inputs.use_host_toolchain }}
          debug-info: ${{ inputs.debug_info }}
          build-os: ${{ inputs.build_os }}
          build-arch: ${{ inputs.build_arch }}
          os: ${{ matrix.os }}
          arch: ${{ matrix.arch }}
          src-dir: ${{ github.workspace }}/SourceCache/swift-toolchain-sqlite
          bin-dir: ${{ github.workspace }}/BinaryCache/stage0-sqlite-${{ inputs.swift_toolchain_sqlite_version }}
          install-dir: ${{ github.workspace }}/BuildRoot/Library/stage0-sqlite-${{ inputs.swift_toolchain_sqlite_version }}/usr
          android-api-level: ${{ inputs.ANDROID_API_LEVEL }}
          android-clang-version: ${{ inputs.ANDROID_CLANG_VERSION }}
          c-compiler: ${{ inputs.use_host_toolchain && '$Compilers.MSVC.C' || '$Compilers.Pinned.C' }}
          cmake-defines: |
            @{
              'BUILD_SHARED_LIBS' = "NO";
            }
      - name: Build SQLite
        run: cmake --build ${{ github.workspace }}/BinaryCache/stage0-sqlite-${{ inputs.swift_toolchain_sqlite_version }}
      - name: Install SQLite
        run: cmake --build ${{ github.workspace }}/BinaryCache/stage0-sqlite-${{ inputs.swift_toolchain_sqlite_version }} --target install

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-${{ matrix.arch }}-stage0-sqlite-${{ inputs.swift_toolchain_sqlite_version }}
          path: ${{ github.workspace }}/BuildRoot/Library/stage0-sqlite-${{ inputs.swift_toolchain_sqlite_version }}/usr

      - name: Save CAS
        uses: ./SourceCache/ci-build/.github/actions/save-cas
        if: ${{ !inputs.use_host_toolchain }}
        with:
          s3-bucket: ${{ vars.SCCACHE_S3_BUCKET }}
          aws-region: ${{ vars.SCCACHE_AWS_REGION }}
          aws-arn: ${{ vars.SCCACHE_AWS_ARN }}
          cache-key: ${{ matrix.os }}-${{ matrix.arch }}-stage0-sqlite

  stage0-libxml2:
    runs-on: ${{ inputs.default_build_runner }}

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(inputs.build_matrix) }}

    name: ${{ matrix.os }} ${{ matrix.arch }} Stage0 libxml2

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          ref: ${{ inputs.ci_build_revision }}
          path: ${{ github.workspace }}/SourceCache/ci-build
          show-progress: false
      - uses: ./SourceCache/ci-build/.github/actions/setup-build
        with:
          setup-vs-dev-env: ${{ matrix.os == 'Windows' }}
          host-arch: ${{ matrix.arch }}
          swift-version: ${{ env.PINNED_BOOTSTRAP_TOOLCHAIN_VERSION }}

      - name: Compute workspace hash
        id: workspace_hash
        shell: pwsh
        run: |
          $stringAsStream = [System.IO.MemoryStream]::new()
          $writer = [System.IO.StreamWriter]::new($stringAsStream)
          $writer.write("${{ github.workspace }}")
          $writer.Flush()
          $stringAsStream.Position = 0
          $hash = (Get-FileHash -Algorithm SHA256 -InputStream $stringAsStream).Hash
          echo "hash=$hash" >> $env:GITHUB_OUTPUT
      - name: Setup sccache
        uses: ./SourceCache/ci-build/.github/actions/setup-sccache
        if: inputs.use_host_toolchain
        with:
          s3-bucket: ${{ vars.SCCACHE_S3_BUCKET }}
          aws-region: ${{ vars.SCCACHE_AWS_REGION }}
          aws-arn: ${{ vars.SCCACHE_AWS_ARN }}
          disk-max-size: 100M
          disk-cache-key: ${{ steps.workspace_hash.outputs.hash }}-${{ matrix.os }}-${{ matrix.arch }}-stage0-libxml2

      - name: Restore CAS
        uses: ./SourceCache/ci-build/.github/actions/restore-cas
        if: ${{ !inputs.use_host_toolchain }}
        with:
          s3-bucket: ${{ vars.SCCACHE_S3_BUCKET }}
          aws-region: ${{ vars.SCCACHE_AWS_REGION }}
          aws-arn: ${{ vars.SCCACHE_AWS_ARN }}
          cache-key: ${{ matrix.os }}-${{ matrix.arch }}-stage0-libxml2

      - uses: actions/checkout@v4.2.2
        with:
          repository: gnome/libxml2
          ref: ${{ inputs.libxml2_revision }}
          path: ${{ github.workspace }}/SourceCache/libxml2
          show-progress: false

      # build.ps1: Build-XML2
      - name: Configure libxml2
        uses: ./SourceCache/ci-build/.github/actions/configure-cmake-project
        with:
          project-name: Stage0 libxml2
          swift-version: ${{ inputs.swift_version }}
          enable-caching: ${{ inputs.use_host_toolchain }}
          enable-cas: ${{ !inputs.use_host_toolchain }}
          debug-info: ${{ inputs.debug_info }}
          build-os: ${{ inputs.build_os }}
          build-arch: ${{ inputs.build_arch }}
          os: ${{ matrix.os }}
          arch: ${{ matrix.arch }}
          src-dir: ${{ github.workspace }}/SourceCache/libxml2
          bin-dir: ${{ github.workspace }}/BinaryCache/stage0-libxml2-${{ inputs.libxml2_version }}
          install-dir: ${{ github.workspace }}/BuildRoot/Library/stage0-libxml2-${{ inputs.libxml2_version }}/usr
          c-compiler: ${{ inputs.use_host_toolchain && '$Compilers.MSVC.C' || '$Compilers.Pinned.C' }}
          cxx-compiler: ${{ inputs.use_host_toolchain && '$Compilers.MSVC.CXX' || '$Compilers.Pinned.CXX' }}
          cmake-defines: |
            @{
              'BUILD_SHARED_LIBS' = "NO";
              'CMAKE_POSITION_INDEPENDENT_CODE' = "YES";
              'LIBXML2_WITH_ICONV' = "NO";
              'LIBXML2_WITH_ICU' = "NO";
              'LIBXML2_WITH_LZMA' = "NO";
              'LIBXML2_WITH_PYTHON' = "NO";
              'LIBXML2_WITH_TESTS' = "NO";
              'LIBXML2_WITH_THREADS' = "YES";
              'LIBXML2_WITH_ZLIB' = "NO";
            }
      - name: Build libxml2
        run: cmake --build ${{ github.workspace }}/BinaryCache/stage0-libxml2-${{ inputs.libxml2_version }}
      - name: Install libxml2
        run: cmake --build ${{ github.workspace }}/BinaryCache/stage0-libxml2-${{ inputs.libxml2_version }} --target install

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-${{ matrix.arch }}-stage0-libxml2-${{ inputs.libxml2_version }}
          path: ${{ github.workspace }}/BuildRoot/Library/stage0-libxml2-${{ inputs.libxml2_version }}/usr

      - name: Save CAS
        uses: ./SourceCache/ci-build/.github/actions/save-cas
        if: ${{ !inputs.use_host_toolchain }}
        with:
          s3-bucket: ${{ vars.SCCACHE_S3_BUCKET }}
          aws-region: ${{ vars.SCCACHE_AWS_REGION }}
          aws-arn: ${{ vars.SCCACHE_AWS_ARN }}
          cache-key: ${{ matrix.os }}-${{ matrix.arch }}-stage0-libxml2

  ds2_tools:
    # TODO: Build this on macOS or make an equivalent Mac-only job
    runs-on: ${{ inputs.default_build_runner }}

    name: ds2 Build Tools

    steps:
      - uses: actions/checkout@v4.2.2
        if: inputs.build_android
        with:
          ref: ${{ inputs.ci_build_revision }}
          path: ${{ github.workspace }}/SourceCache/ci-build
          show-progress: false
      - uses: ./SourceCache/ci-build/.github/actions/setup-build
        if: inputs.build_android
        with:
          setup-vs-dev-env: true
          swift-version: ${{ env.PINNED_BOOTSTRAP_TOOLCHAIN_VERSION }}

      - name: Compute workspace hash
        if: inputs.build_android
        id: workspace_hash
        run: |
          $stringAsStream = [System.IO.MemoryStream]::new()
          $writer = [System.IO.StreamWriter]::new($stringAsStream)
          $writer.write("${{ github.workspace }}")
          $writer.Flush()
          $stringAsStream.Position = 0
          $hash = (Get-FileHash -Algorithm SHA256 -InputStream $stringAsStream).Hash
          echo "hash=$hash" >> $env:GITHUB_OUTPUT
      - name: Setup sccache
        if: ${{ inputs.build_android && inputs.use_host_toolchain }}
        uses: ./SourceCache/ci-build/.github/actions/setup-sccache
        with:
          s3-bucket: ${{ vars.SCCACHE_S3_BUCKET }}
          aws-region: ${{ vars.SCCACHE_AWS_REGION }}
          aws-arn: ${{ vars.SCCACHE_AWS_ARN }}
          disk-max-size: 1M
          disk-cache-key: ${{ steps.workspace_hash.outputs.hash }}-${{ inputs.build_os }}-${{ inputs.build_arch }}-ds2_tools
      - name: Restore CAS
        uses: ./SourceCache/ci-build/.github/actions/restore-cas
        if: ${{ inputs.build_android && !inputs.use_host_toolchain }}
        with:
          s3-bucket: ${{ vars.SCCACHE_S3_BUCKET }}
          aws-region: ${{ vars.SCCACHE_AWS_REGION }}
          aws-arn: ${{ vars.SCCACHE_AWS_ARN }}
          cache-key: ${{ matrix.os }}-${{ matrix.arch }}-ds2_tools

      - uses: actions/checkout@v4.2.2
        # There is currently no Android NDK for Windows ARM64 so build ds2_tools only on Windows X64 host only
        if: inputs.build_android
        with:
          repository: compnerd/ds2
          ref: ${{ inputs.ds2_revision }}
          path: ${{ github.workspace }}/SourceCache/ds2
          show-progress: false

      # TODO(issues/205): Preload Chocolatey package manager on Azure images so we can remove this step.
      - uses: andrurogerz/ensure-chocolatey@v1
        if: inputs.build_android

      - name: Install Flex and Bison Tools
        run: choco install winflexbison3
        if: inputs.build_android

      # build.ps1: Build-RegsGen2
      - name: Configure RegsGen2
        if: inputs.build_android
        uses: ./SourceCache/ci-build/.github/actions/configure-cmake-project
        with:
          project-name: RegsGen2
          swift-version: ${{ inputs.swift_version }}
          enable-caching: ${{ inputs.use_host_toolchain }}
          enable-cas: ${{ !inputs.use_host_toolchain }}
          debug-info: ${{ inputs.debug_info }}
          build-os: ${{ inputs.build_os }}
          build-arch: ${{ inputs.build_arch }}
          os: ${{ inputs.build_os }}
          arch: ${{ inputs.build_arch }}
          src-dir: ${{ github.workspace }}/SourceCache/ds2/Tools/RegsGen2
          bin-dir: ${{ github.workspace }}/BinaryCache/RegsGen2
          c-compiler: ${{ inputs.use_host_toolchain && '$Compilers.MSVC.C' || '$Compilers.Pinned.C' }}
          cxx-compiler: ${{ inputs.use_host_toolchain && '$Compilers.MSVC.CXX' || '$Compilers.Pinned.CXX' }}
          cache-script: ${{ github.workspace }}/SourceCache/ds2/cmake/caches/MSVCWarnings.cmake
      - name: Build RegsGen2
        if: inputs.build_android
        run: cmake --build ${{ github.workspace }}/BinaryCache/RegsGen2 --config Release

      - uses: actions/upload-artifact@v4
        if: inputs.build_android
        with:
          name: Windows-${{ inputs.build_arch }}-regsgen2
          path: |
            ${{ github.workspace }}/BinaryCache/RegsGen2/regsgen2.exe
      - name: Save CAS
        uses: ./SourceCache/ci-build/.github/actions/save-cas
        if: ${{ inputs.build_android && !inputs.use_host_toolchain }}
        with:
          s3-bucket: ${{ vars.SCCACHE_S3_BUCKET }}
          aws-region: ${{ vars.SCCACHE_AWS_REGION }}
          aws-arn: ${{ vars.SCCACHE_AWS_ARN }}
          cache-key: ${{ matrix.os }}-${{ matrix.arch }}-ds2_tools

  ds2:
    # TODO: Build this on macOS or make an equivalent Mac-only job
    needs: [ds2_tools]
    runs-on: ${{ inputs.default_build_runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            os: Android
            module_triple: aarch64-unknown-linux-android
          - arch: armv7
            os: Android
            module_triple: armv7-unknown-linux-android
          - arch: i686
            os: Android
            module_triple: i686-unknown-linux-android
          - arch: x86_64
            os: Android
            module_triple: x86_64-unknown-linux-android

    name: ${{ matrix.os }} ${{ matrix.arch }} ds2

    steps:
      - uses: actions/checkout@v4.2.2
        if: inputs.build_android
        with:
          ref: ${{ inputs.ci_build_revision }}
          path: ${{ github.workspace }}/SourceCache/ci-build
          show-progress: false
      - uses: ./SourceCache/ci-build/.github/actions/setup-build
        if: inputs.build_android
        with:
          setup-vs-dev-env: ${{ matrix.os == 'Windows' }}
          host-arch: ${{ matrix.arch }}
          swift-version: ${{ env.PINNED_BOOTSTRAP_TOOLCHAIN_VERSION }}

      - name: Compute workspace hash
        if: inputs.build_android
        id: workspace_hash
        run: |
          $stringAsStream = [System.IO.MemoryStream]::new()
          $writer = [System.IO.StreamWriter]::new($stringAsStream)
          $writer.write("${{ github.workspace }}")
          $writer.Flush()
          $stringAsStream.Position = 0
          $hash = (Get-FileHash -Algorithm SHA256 -InputStream $stringAsStream).Hash
          echo "hash=$hash" >> $env:GITHUB_OUTPUT
      - name: Setup sccache
        if: ${{ inputs.build_android && inputs.use_host_toolchain }}
        uses: ./SourceCache/ci-build/.github/actions/setup-sccache
        with:
          s3-bucket: ${{ vars.SCCACHE_S3_BUCKET }}
          aws-region: ${{ vars.SCCACHE_AWS_REGION }}
          aws-arn: ${{ vars.SCCACHE_AWS_ARN }}
          disk-max-size: 1M
          disk-cache-key: ${{ steps.workspace_hash.outputs.hash }}-${{ inputs.build_os }}-${{ inputs.build_arch }}-ds2
      - name: Restore CAS
        uses: ./SourceCache/ci-build/.github/actions/restore-cas
        if: ${{ inputs.build_android && !inputs.use_host_toolchain }}
        with:
          s3-bucket: ${{ vars.SCCACHE_S3_BUCKET }}
          aws-region: ${{ vars.SCCACHE_AWS_REGION }}
          aws-arn: ${{ vars.SCCACHE_AWS_ARN }}
          cache-key: ${{ matrix.os }}-${{ matrix.arch }}-ds2

      - uses: actions/checkout@v4.2.2
        # There is currently no Android NDK for Windows ARM64 so build ds2 only on Windows X64 host only
        if: inputs.build_android
        with:
          repository: compnerd/ds2
          ref: ${{ inputs.ds2_revision }}
          path: ${{ github.workspace }}/SourceCache/ds2
          show-progress: false

      # TODO(issues/205): Preload Chocolatey package manager on Azure images so we can remove this step.
      - uses: andrurogerz/ensure-chocolatey@v1
        if: inputs.build_android

      - name: Install Flex and Bison Tools
        if: inputs.build_android
        run: choco install winflexbison3

      - uses: actions/download-artifact@v4
        if: inputs.build_android
        with:
          name: Windows-${{ inputs.build_arch }}-regsgen2
          path: ${{ github.workspace }}/BinaryCache/RegsGen2

      - uses: nttld/setup-ndk@v1
        if: inputs.build_android
        id: setup-ndk
        with:
          ndk-version: ${{ inputs.ANDROID_NDK_VERSION }}
          local-cache: true

      # build.ps1: Build-DS2
      - name: Configure DS2
        if: inputs.build_android
        uses: ./SourceCache/ci-build/.github/actions/configure-cmake-project
        with:
          project-name: DS2
          swift-version: ${{ inputs.swift_version }}
          enable-caching: ${{ inputs.use_host_toolchain }}
          enable-cas: ${{ !inputs.use_host_toolchain }}
          debug-info: ${{ inputs.debug_info }}
          build-os: ${{ inputs.build_os }}
          build-arch: ${{ inputs.build_arch }}
          os: ${{ matrix.os }}
          arch: ${{ matrix.arch }}
          src-dir: ${{ github.workspace }}/SourceCache/ds2
          bin-dir: ${{ github.workspace }}/BinaryCache/ds2
          install-dir: ${{ github.workspace }}/BinaryCache/Library/Developer/ds2/usr
          android-api-level: ${{ inputs.ANDROID_API_LEVEL }}
          android-clang-version: ${{ inputs.ANDROID_CLANG_VERSION }}
          ndk-path: ${{ steps.setup-ndk.outputs.ndk-path }}
          c-compiler: '$Compilers.Pinned.C'
          cxx-compiler: '$Compilers.Pinned.CXX'
          cmake-defines: |
            @{
              'DS2_REGSGEN2' = "${{ github.workspace }}/BinaryCache/RegsGen2/regsgen2.exe";
              'DS2_PROGRAM_PREFIX' = "${{ matrix.module_triple }}-";
            }
      - name: Build DS2
        if: inputs.build_android
        run: cmake --build ${{ github.workspace }}/BinaryCache/ds2
      - name: Install DS2
        if: inputs.build_android
        run: cmake --build ${{ github.workspace }}/BinaryCache/ds2 --target install

      - uses: actions/upload-artifact@v4
        if: inputs.build_android
        with:
          name: ${{ matrix.os }}-${{ matrix.arch }}-ds2
          path: ${{ github.workspace }}/BinaryCache/Library/Developer

      - name: Save CAS
        uses: ./SourceCache/ci-build/.github/actions/save-cas
        if: ${{ inputs.build_android && !inputs.use_host_toolchain }}
        with:
          s3-bucket: ${{ vars.SCCACHE_S3_BUCKET }}
          aws-region: ${{ vars.SCCACHE_AWS_REGION }}
          aws-arn: ${{ vars.SCCACHE_AWS_ARN }}
          cache-key: ${{ matrix.os }}-${{ matrix.arch }}-ds2

  cmark_gfm:
    runs-on: ${{ inputs.default_build_runner }}

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(inputs.host_matrix) }}

    name: ${{ matrix.os }} ${{ matrix.arch }} CMark GFM

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          ref: ${{ inputs.ci_build_revision }}
          path: ${{ github.workspace }}/SourceCache/ci-build
          show-progress: false
      - uses: ./SourceCache/ci-build/.github/actions/setup-build
        with:
          setup-vs-dev-env: true
          host-arch: ${{ matrix.arch }}
          swift-version: ${{ env.PINNED_BOOTSTRAP_TOOLCHAIN_VERSION }}

      - name: Compute workspace hash
        id: workspace_hash
        run: |
          $stringAsStream = [System.IO.MemoryStream]::new()
          $writer = [System.IO.StreamWriter]::new($stringAsStream)
          $writer.write("${{ github.workspace }}")
          $writer.Flush()
          $stringAsStream.Position = 0
          $hash = (Get-FileHash -Algorithm SHA256 -InputStream $stringAsStream).Hash
          echo "hash=$hash" >> $env:GITHUB_OUTPUT
      - name: Setup sccache
        uses: ./SourceCache/ci-build/.github/actions/setup-sccache
        if: inputs.use_host_toolchain
        with:
