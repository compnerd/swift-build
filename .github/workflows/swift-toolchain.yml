          symbolsFolder: ${{ github.workspace }}/BinaryCache
          searchPattern: '**/*.pdb'

      - name: Upload PDBs to Public Symbol Server
        uses: ./SourceCache/ci-build/.github/actions/publish-symbols-r2
        if: ${{ inputs.debug_info && matrix.os == 'Windows' }}
        with:
