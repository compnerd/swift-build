  sdk:
    if: inputs.build_os == 'Windows'
    needs: [stage1-compiler, bootstrap-macros, sqlite, zlib, brotli, curl, libxml2]
    runs-on: ${{ inputs.default_build_runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: Windows
            arch: amd64
            triple: x86_64-unknown-windows-msvc
            static: true
          - os: Windows
            arch: amd64
            triple: x86_64-unknown-windows-msvc
            static: false
          - os: Windows
            arch: arm64
            triple: aarch64-unknown-windows-msvc
            static: true
          - os: Windows
            arch: arm64
            triple: aarch64-unknown-windows-msvc
            static: false
          - os: Windows
            arch: x86
            triple: i686-unknown-windows-msvc
            static: true
          - os: Windows
            arch: x86
            triple: i686-unknown-windows-msvc
            static: false
          - os: Android
            arch: arm64
            triple: 'aarch64-unknown-linux-android${{ inputs.ANDROID_API_LEVEL }}'
            static: true
          - os: Android
            arch: armv7
            triple: 'armv7-unknown-linux-androideabi${{ inputs.ANDROID_API_LEVEL }}'
            static: true
          - os: Android
            arch: i686
            triple: 'i686-unknown-linux-android${{ inputs.ANDROID_API_LEVEL }}'
            static: true
          - os: Android
            arch: x86_64
            triple: 'x86_64-unknown-linux-android${{ inputs.ANDROID_API_LEVEL }}'
            static: true

    name: ${{ matrix.os }} ${{ matrix.arch }} ${{ matrix.static && 'static' || 'shared' }} SDK

    steps:
      - uses: actions/checkout@v4.2.2
        if: matrix.os != 'Android' || inputs.build_android
        with:
          ref: ${{ inputs.ci_build_revision }}
          path: ${{ github.workspace }}/SourceCache/ci-build
          show-progress: false
      - uses: ./SourceCache/ci-build/.github/actions/setup-build
        if: matrix.os != 'Android' || inputs.build_android
        with:
          setup-vs-dev-env: ${{ matrix.os == 'Windows' }}
          host-arch: ${{ matrix.arch }}

      - uses: actions/setup-python@v5
        if: matrix.os != 'Android' || inputs.build_android
        with:
          python-version: ${{ inputs.python_version }}
          architecture: x64 # FIXME(#1004): Remove workaround installing x64 Python on ARM64 CI hosts

      - name: Restore CAS
        uses: ./SourceCache/ci-build/.github/actions/restore-cas
        if: matrix.os != 'Android' || inputs.build_android
        with:
          s3-bucket: ${{ vars.SCCACHE_S3_BUCKET }}
          aws-region: ${{ vars.SCCACHE_AWS_REGION }}
          aws-arn: ${{ vars.SCCACHE_AWS_ARN }}
          cache-key: ${{ matrix.os }}-${{ matrix.arch }}-${{ matrix.static && 'static' || 'shared' }}-experimental-sdk

      - uses: actions/download-artifact@v4
        if: matrix.os != 'Android' || inputs.build_android
        with:
          name: ${{ matrix.os }}-${{ matrix.arch }}-libxml2-${{ inputs.libxml2_version }}
          path: ${{ github.workspace }}/BuildRoot/Library/libxml2-${{ inputs.libxml2_version }}/usr
      - uses: actions/download-artifact@v4
        if: matrix.os != 'Android' || inputs.build_android
        with:
          name: ${{ matrix.os }}-${{ matrix.arch }}-curl-${{ inputs.curl_version }}
          path: ${{ github.workspace }}/BuildRoot/Library/curl-${{ inputs.curl_version }}/usr
      - uses: actions/download-artifact@v4
        if: matrix.os != 'Android' || inputs.build_android
        with:
          name: ${{ matrix.os }}-${{ matrix.arch }}-zlib-${{ inputs.zlib_version }}
          path: ${{ github.workspace }}/BuildRoot/Library/zlib-${{ inputs.zlib_version }}/usr
      - uses: actions/download-artifact@v4
        if: matrix.os != 'Android' || inputs.build_android
        with:
          name: ${{ matrix.os }}-${{ matrix.arch }}-brotli-${{ inputs.brotli_version }}
          path: ${{ github.workspace }}/BuildRoot/Library/brotli-${{ inputs.brotli_version }}/usr

      - name: Download Compiler
        if: matrix.os != 'Android' || inputs.build_android
        uses: thebrowsercompany/gha-download-tar-artifact@59992d91335d4ecba543c8535f7d07238e42125d # main
        with:
          name: ${{ inputs.build_os }}-${{ inputs.build_arch }}-stage1-compiler
          path: ${{ github.workspace }}/BinaryCache/stage1/Library
      - uses: actions/download-artifact@v4
        if: matrix.os != 'Android' || inputs.build_android
        with:
          name: ${{ inputs.build_os }}-${{ inputs.build_arch }}-bootsrap-macros
          path: ${{ github.workspace }}/BinaryCache/Library

      - uses: actions/checkout@v4.2.2
        if: matrix.os != 'Android' || inputs.build_android
        with:
          repository: swiftlang/swift
          ref: ${{ inputs.swift_revision }}
          path: ${{ github.workspace }}/SourceCache/swift
          show-progress: false
      - uses: actions/checkout@v4.2.2
        if: matrix.os != 'Android' || inputs.build_android
        with:
          repository: swiftlang/llvm-project
          ref: ${{ inputs.llvm_project_revision }}
          path: ${{ github.workspace }}/SourceCache/llvm-project
          show-progress: false
      - uses: actions/checkout@v4.2.2
        if: matrix.os != 'Android' || inputs.build_android
        with:
          repository: apple/swift-collections
          ref: ${{ inputs.swift_collections_revision }}
          path: ${{ github.workspace }}/SourceCache/swift-collections
          show-progress: false
      - uses: actions/checkout@v4.2.2
        if: matrix.os != 'Android' || inputs.build_android
        with:
          repository: apple/swift-corelibs-libdispatch
          ref: ${{ inputs.swift_corelibs_libdispatch_revision }}
          path: ${{ github.workspace }}/SourceCache/swift-corelibs-libdispatch
          show-progress: false
      - uses: actions/checkout@v4.2.2
        if: matrix.os != 'Android' || inputs.build_android
        with:
          repository: swiftlang/swift-corelibs-foundation
          ref: ${{ inputs.swift_corelibs_foundation_revision }}
          path: ${{ github.workspace }}/SourceCache/swift-corelibs-foundation
          show-progress: false
      - uses: actions/checkout@v4.2.2
        if: matrix.os != 'Android' || inputs.build_android
        with:
          repository: apple/swift-foundation
          ref: ${{ inputs.swift_foundation_revision }}
          path: ${{ github.workspace }}/SourceCache/swift-foundation
          show-progress: false
      - uses: actions/checkout@v4.2.2
        if: matrix.os != 'Android' || inputs.build_android
        with:
          repository: apple/swift-foundation-icu
          ref: ${{ inputs.swift_foundation_icu_revision }}
          path: ${{ github.workspace }}/SourceCache/swift-foundation-icu
          show-progress: false
      - uses: actions/checkout@v4.2.2
        if: matrix.os != 'Android' || inputs.build_android
        with:
          repository: swiftlang/swift-experimental-string-processing
          ref: ${{ inputs.swift_experimental_string_processing_revision }}
          path: ${{ github.workspace }}/SourceCache/swift-experimental-string-processing
          show-progress: false

      - name: Setup environment
        if: matrix.os != 'Android' || inputs.build_android
        run: |
          $RTLPath = cygpath -w ${{ github.workspace }}/BinaryCache/stage1/Library/Developer/Platforms/${{ matrix.os }}.platform/Developer/SDKs/${{ matrix.os }}.sdk/usr/bin
          echo ${RTLPath} | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - uses: nttld/setup-ndk@v1
        if: matrix.os == 'Android' && inputs.build_android
        id: setup-ndk
        with:
          ndk-version: ${{ inputs.ANDROID_NDK_VERSION }}
          local-cache: true

      - name: Run Resync
        if: matrix.os != 'Android' || inputs.build_android
        run: |
          cd ${{ github.workspace }}/SourceCache/swift/Runtimes
          cmake -P Resync.cmake

      # build.ps1: Build-CDispatch
      - name: Configure CDispatch
        if: matrix.os != 'Android' || inputs.build_android
        uses: ./SourceCache/ci-build/.github/actions/configure-cmake-project
        with:
          project-name: libdispatch-c
          swift-version: ${{ inputs.swift_version }}
          enable-caching: false
          enable-cas: true
          debug-info: ${{ inputs.debug_info }}
          build-os: ${{ inputs.build_os }}
          build-arch: ${{ inputs.build_arch }}
          os: ${{ matrix.os }}
          arch: ${{ matrix.arch }}
          src-dir: ${{ github.workspace }}/SourceCache/swift-corelibs-libdispatch 
          bin-dir: ${{ github.workspace }}/BinaryCache/libdispatch-c 
          android-api-level: ${{ inputs.ANDROID_API_LEVEL }}
          android-clang-version: ${{ inputs.ANDROID_CLANG_VERSION }}
          ndk-path: ${{ steps.setup-ndk.outputs.ndk-path }}
          c-compiler: ${{ matrix.os == 'Windows' && '$Compilers.Stage1.C' || '$Compilers.Stage1.GNUC' }}
          cxx-compiler: ${{ matrix.os == 'Windows' && '$Compilers.Stage1.CXX' || '$Compilers.Stage1.GNUCXX' }}
          cmake-defines: |
            @{
              'BUILD_SHARED_LIBS' = "YES";
              'BUILD_TESTING' = "NO";
              'ENABLE_SWIFT' = "NO";
            }
      - name: Build CDispatch
        if: matrix.os != 'Android' || inputs.build_android
        run: |
          cmake --build ${{ github.workspace }}/BinaryCache/libdispatch-c

      # build.ps1: Build-SDK
      - name: Configure Runtime
        if: matrix.os != 'Android' || inputs.build_android
        uses: ./SourceCache/ci-build/.github/actions/configure-cmake-project
        with:
          project-name: Runtime
          swift-version: ${{ inputs.swift_version }}
          enable-caching: false
          enable-cas: true
          debug-info: ${{ inputs.debug_info }}
          build-os: ${{ inputs.build_os }}
          build-arch: ${{ inputs.build_arch }}
          os: ${{ matrix.os }}
          arch: ${{ matrix.arch }}
          src-dir: ${{ github.workspace }}/SourceCache/swift/Runtimes/Core
          bin-dir: ${{ github.workspace }}/BinaryCache/Runtime 
          install-dir: ${{ github.workspace }}/BuildRoot/Library/Developer/Platforms/${{ matrix.os }}.platform/Developer/SDKs/${{ matrix.os }}.sdk/usr
          android-api-level: ${{ inputs.ANDROID_API_LEVEL }}
          android-clang-version: ${{ inputs.ANDROID_CLANG_VERSION }}
          ndk-path: ${{ steps.setup-ndk.outputs.ndk-path }}
          c-compiler: '$Compilers.Stage1.GNUC'
          cxx-compiler: '$Compilers.Stage1.GNUCXX'
          swift-compiler: '$Compilers.Stage1.Swift'
          cmake-defines: |
            @{
              'BUILD_SHARED_LIBS' = "${{ matrix.static && 'NO' || 'YES' }}";
              'CMAKE_STATIC_LIBRARY_PREFIX_Swift' = "lib";
              'dispatch_DIR' = "${{ github.workspace }}/BinaryCache/libdispatch-c/cmake/modules";
              # FIXME(hjyamauchi) Should dynamic to libdispatch https://github.com/swiftlang/swift/issues/87548
              'CMAKE_CXX_FLAGS' = ${{ matrix.static && '@("-Ddispatch_STATIC")' || '@()' }};
              'CMAKE_Swift_FLAGS' = ${{ matrix.static && '@("-Xcc", "-static-libclosure")' || '@()' }};
              # FIXME(compnerd) remove this once the default option is flipped to `ON`.
              'SwiftCore_ENABLE_BACKTRACING' = "YES";
              # FIXME(compnerd) remove this once the default option is flipped to `ON`.
              'SwiftCore_ENABLE_CONCURRENCY' = "YES";
              # FIXME(compnerd) remove this once the default option is flipped to `ON`.
              'SwiftCore_ENABLE_REMOTE_MIRROR' = "YES";
              # FIXME(compnerd) this currently causes a build failure on Windows, but
              # this should be enabled when building the dynamic runtime.
              'SwiftCore_ENABLE_LIBRARY_EVOLUTION' = "NO";
            }
      - name: Build Runtime
        if: matrix.os != 'Android' || inputs.build_android
        run: |
          cmake --build ${{ github.workspace }}/BinaryCache/Runtime
      - name: Install Runtime
        if: matrix.os != 'Android' || inputs.build_android
        run: |
          cmake --build ${{ github.workspace }}/BinaryCache/Runtime --target install

      # build.ps1: Build-SDK
      - name: Configure Overlay
        if: matrix.os != 'Android' || inputs.build_android
        uses: ./SourceCache/ci-build/.github/actions/configure-cmake-project
        with:
          project-name: Overlay
          swift-version: ${{ inputs.swift_version }}
          enable-caching: false
          enable-cas: true
          debug-info: ${{ inputs.debug_info }}
          build-os: ${{ inputs.build_os }}
          build-arch: ${{ inputs.build_arch }}
          os: ${{ matrix.os }}
          arch: ${{ matrix.arch }}
          src-dir: ${{ github.workspace }}/SourceCache/swift/Runtimes/Overlay
          bin-dir: ${{ github.workspace }}/BinaryCache/Overlay
          install-dir: ${{ github.workspace }}/BuildRoot/Library/Developer/Platforms/${{ matrix.os }}.platform/Developer/SDKs/${{ matrix.os }}.sdk/usr
          android-api-level: ${{ inputs.ANDROID_API_LEVEL }}
          android-clang-version: ${{ inputs.ANDROID_CLANG_VERSION }}
          ndk-path: ${{ steps.setup-ndk.outputs.ndk-path }}
          c-compiler: '$Compilers.Stage1.GNUC'
          cxx-compiler: '$Compilers.Stage1.GNUCXX'
          swift-compiler: '$Compilers.Stage1.Swift'
          cmake-defines: |
            @{
              'BUILD_SHARED_LIBS' = "${{ matrix.static && 'NO' || 'YES' }}";
              'CMAKE_STATIC_LIBRARY_PREFIX_Swift' = "lib";
              'SwiftCore_DIR' = "${{ github.workspace }}/BinaryCache/Runtime/cmake/SwiftCore";
              # FIXME(compnerd) this currently causes a build failure on Windows, but
              # this should be enabled when building the dynamic runtime.
              'SwiftOverlay_ENABLE_LIBRARY_EVOLUTION' = "NO";
              'SwiftOverlay_ENABLE_CXX_INTEROP' = "YES";
            }
      - name: Build Overlay
        if: matrix.os != 'Android' || inputs.build_android
        run: |
          cmake --build ${{ github.workspace }}/BinaryCache/Overlay
      - name: Install Overlay
        if: matrix.os != 'Android' || inputs.build_android
        run: |
          cmake --build ${{ github.workspace }}/BinaryCache/Overlay --target install

      # build.ps1: Build-SDK
      - name: Configure String Processing
        if: matrix.os != 'Android' || inputs.build_android
        uses: ./SourceCache/ci-build/.github/actions/configure-cmake-project
        with:
          project-name: StringProcessing
          swift-version: ${{ inputs.swift_version }}
          enable-caching: false
          enable-cas: true
          debug-info: ${{ inputs.debug_info }}
          build-os: ${{ inputs.build_os }}
          build-arch: ${{ inputs.build_arch }}
          os: ${{ matrix.os }}
          arch: ${{ matrix.arch }}
          src-dir: ${{ github.workspace }}/SourceCache/swift/Runtimes/Supplemental/StringProcessing
          bin-dir: ${{ github.workspace }}/BinaryCache/StringProcessing
          install-dir: ${{ github.workspace }}/BuildRoot/Library/Developer/Platforms/${{ matrix.os }}.platform/Developer/SDKs/${{ matrix.os }}.sdk/usr
          android-api-level: ${{ inputs.ANDROID_API_LEVEL }}
          android-clang-version: ${{ inputs.ANDROID_CLANG_VERSION }}
          ndk-path: ${{ steps.setup-ndk.outputs.ndk-path }}
          c-compiler: '$Compilers.Stage1.GNUC'
          cxx-compiler: '$Compilers.Stage1.GNUCXX'
          swift-compiler: '$Compilers.Stage1.Swift'
          cmake-defines: |
            @{
              'BUILD_SHARED_LIBS' = "${{ matrix.static && 'NO' || 'YES' }}";
              'CMAKE_STATIC_LIBRARY_PREFIX_Swift' = "lib";
              'SwiftCore_DIR' = "${{ github.workspace }}/BinaryCache/Runtime/cmake/SwiftCore";
              # FIXME(compnerd) this currently causes a build failure on Windows, but
              # this should be enabled when building the dynamic runtime.
              'SwiftStringProcessing_ENABLE_LIBRARY_EVOLUTION' = "NO";
            }
      - name: Build tring Processing
        if: matrix.os != 'Android' || inputs.build_android
        run: |
          cmake --build ${{ github.workspace }}/BinaryCache/StringProcessing
      - name: Install tring Processing
        if: matrix.os != 'Android' || inputs.build_android
        run: |
          cmake --build ${{ github.workspace }}/BinaryCache/StringProcessing --target install

      # build.ps1: Build-SDK
      - name: Configure Synchronization
        if: matrix.os != 'Android' || inputs.build_android
        uses: ./SourceCache/ci-build/.github/actions/configure-cmake-project
        with:
          project-name: Synchronization
          swift-version: ${{ inputs.swift_version }}
          enable-caching: false
          enable-cas: true
          debug-info: ${{ inputs.debug_info }}
          build-os: ${{ inputs.build_os }}
          build-arch: ${{ inputs.build_arch }}
          os: ${{ matrix.os }}
          arch: ${{ matrix.arch }}
          src-dir: ${{ github.workspace }}/SourceCache/swift/Runtimes/Supplemental/Synchronization
          bin-dir: ${{ github.workspace }}/BinaryCache/Synchronization
          install-dir: ${{ github.workspace }}/BuildRoot/Library/Developer/Platforms/${{ matrix.os }}.platform/Developer/SDKs/${{ matrix.os }}.sdk/usr
          android-api-level: ${{ inputs.ANDROID_API_LEVEL }}
          android-clang-version: ${{ inputs.ANDROID_CLANG_VERSION }}
          ndk-path: ${{ steps.setup-ndk.outputs.ndk-path }}
          c-compiler: '$Compilers.Stage1.GNUC'
          swift-compiler: '$Compilers.Stage1.Swift'
          cmake-defines: |
            @{
              'BUILD_SHARED_LIBS' = "${{ matrix.static && 'NO' || 'YES' }}";
              'CMAKE_STATIC_LIBRARY_PREFIX_Swift' = "lib";
              'SwiftCore_DIR' = "${{ github.workspace }}/BinaryCache/Runtime/cmake/SwiftCore";
              'SwiftOverlay_DIR' = "${{ github.workspace }}/BinaryCache/Overlay/cmake/SwiftOverlay";
              # FIXME(compnerd) this currently causes a build failure on Windows, but
              # this should be enabled when building the dynamic runtime.
              'SwiftSynchronization_ENABLE_LIBRARY_EVOLUTION' = "NO";
            }
      - name: Build Synchronization
        if: matrix.os != 'Android' || inputs.build_android
        run: |
          cmake --build ${{ github.workspace }}/BinaryCache/Synchronization
      - name: Install Synchronization
        if: matrix.os != 'Android' || inputs.build_android
        run: |
          cmake --build ${{ github.workspace }}/BinaryCache/Synchronization --target install

      # build.ps1: Build-SDK
      - name: Configure Distributed
        if: matrix.os != 'Android' || inputs.build_android
        uses: ./SourceCache/ci-build/.github/actions/configure-cmake-project
        with:
          project-name: Distributed
          swift-version: ${{ inputs.swift_version }}
          enable-caching: false
          enable-cas: true
          debug-info: ${{ inputs.debug_info }}
          build-os: ${{ inputs.build_os }}
          build-arch: ${{ inputs.build_arch }}
          os: ${{ matrix.os }}
          arch: ${{ matrix.arch }}
          src-dir: ${{ github.workspace }}/SourceCache/swift/Runtimes/Supplemental/Distributed 
          bin-dir: ${{ github.workspace }}/BinaryCache/Distributed
          install-dir: ${{ github.workspace }}/BuildRoot/Library/Developer/Platforms/${{ matrix.os }}.platform/Developer/SDKs/${{ matrix.os }}.sdk/usr
          android-api-level: ${{ inputs.ANDROID_API_LEVEL }}
          android-clang-version: ${{ inputs.ANDROID_CLANG_VERSION }}
          ndk-path: ${{ steps.setup-ndk.outputs.ndk-path }}
          c-compiler: '$Compilers.Stage1.GNUC'
          cxx-compiler: '$Compilers.Stage1.GNUCXX'
          swift-compiler: '$Compilers.Stage1.Swift'
          cmake-defines: |
            @{
              'BUILD_SHARED_LIBS' = "${{ matrix.static && 'NO' || 'YES' }}";
              'CMAKE_CXX_FLAGS' = "-I${{ github.workspace }}/BinaryCache/Runtime/include";
              'CMAKE_STATIC_LIBRARY_PREFIX_Swift' = "lib";
              'SwiftCore_DIR' = "${{ github.workspace }}/BinaryCache/Runtime/cmake/SwiftCore";
              'SwiftOverlay_DIR' = "${{ github.workspace }}/BinaryCache/Overlay/cmake/SwiftOverlay";
              # FIXME(compnerd) this currently causes a build failure on Windows, but
              # this should be enabled when building the dynamic runtime.
              'SwiftDistributed_ENABLE_LIBRARY_EVOLUTION' = "NO";
            }
      - name: Build Distributed
        if: matrix.os != 'Android' || inputs.build_android
        run: |
          cmake --build ${{ github.workspace }}/BinaryCache/Distributed
      - name: Install Distributed
        if: matrix.os != 'Android' || inputs.build_android
        run: |
          cmake --build ${{ github.workspace }}/BinaryCache/Distributed --target install

      # build.ps1: Build-SDK
      - name: Configure Observation
        if: matrix.os != 'Android' || inputs.build_android
        uses: ./SourceCache/ci-build/.github/actions/configure-cmake-project
        with:
          project-name: Observation
          swift-version: ${{ inputs.swift_version }}
          enable-caching: false
          enable-cas: true
          debug-info: ${{ inputs.debug_info }}
          build-os: ${{ inputs.build_os }}
          build-arch: ${{ inputs.build_arch }}
          os: ${{ matrix.os }}
          arch: ${{ matrix.arch }}
          src-dir: ${{ github.workspace }}/SourceCache/swift/Runtimes/Supplemental/Observation
          bin-dir: ${{ github.workspace }}/BinaryCache/Observation
          install-dir: ${{ github.workspace }}/BuildRoot/Library/Developer/Platforms/${{ matrix.os }}.platform/Developer/SDKs/${{ matrix.os }}.sdk/usr
          android-api-level: ${{ inputs.ANDROID_API_LEVEL }}
          android-clang-version: ${{ inputs.ANDROID_CLANG_VERSION }}
          ndk-path: ${{ steps.setup-ndk.outputs.ndk-path }}
          cxx-compiler: '$Compilers.Stage1.GNUCXX'
          swift-compiler: '$Compilers.Stage1.Swift'
          cmake-defines: |
            @{
              'BUILD_SHARED_LIBS' = "${{ matrix.static && 'NO' || 'YES' }}";
               # FIXME(#83449): avoid using `SwiftCMakeConfig.h`
              'CMAKE_CXX_FLAGS' = "-I${{ github.workspace }}/BinaryCache/Runtime/include"
              'CMAKE_STATIC_LIBRARY_PREFIX_Swift' = "lib";
              'SwiftCore_DIR' = "${{ github.workspace }}/BinaryCache/Runtime/cmake/SwiftCore";
              'SwiftOverlay_DIR' = "${{ github.workspace }}/BinaryCache/Overlay/cmake/SwiftOverlay";
              # FIXME(compnerd) this currently causes a build failure on Windows, but
              # this should be enabled when building the dynamic runtime.
              'SwiftObservation_ENABLE_LIBRARY_EVOLUTION' = "NO";
