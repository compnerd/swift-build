      - name: Upload DLLs to Azure
        if: matrix.os == 'Windows' && inputs.debug_info
        uses: thebrowsercompany/action-publish-symbols@d5f4b06266463bf9a71ef6a4e3b0b8d79eaa82a4
        with:
          accountName: ${{ vars.SYMBOL_SERVER_ACCOUNT }}
