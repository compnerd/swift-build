          symbolsFolder: ${{ github.workspace }}/BinaryCache
          searchPattern: '**/*.dll'

      - name: Save CAS
        uses: ./SourceCache/ci-build/.github/actions/save-cas
        if: ${{ !inputs.use_host_toolchain && (matrix.os != 'Android' || inputs.build_android) }}
        with:
          s3-bucket: ${{ vars.SCCACHE_S3_BUCKET }}
