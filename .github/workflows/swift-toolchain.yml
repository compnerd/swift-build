name: Swift Toolchain Build
description: |
  This workflow builds the Swift toolchain for a single platform (macOS or
  Windows), with the standard library and SDK for a set of target platforms. The
  `build_android` input can be used to
  enable building the Android standard library and SDK as part of the toolchain.
  This workflow is meant to mimic what the `utils\build.ps1` script does in the
  Swift repository.
  The main difference is that the GHA build (this workflow) splits the build
  into multiple jobs, running in parallel where possible, to reduce overall
  build time. Typically, each individual job checks out a set of source
  repositories, downloads artifacts built by previous jobs, configures and
  builds a set of components and uploads the resulting artifacts.
  The "Configure CMake" steps are the cores of each job, they use the
  `configure-cmake-project` action, which mimics the `Build-CMakeProject` cmdlet
  in `build.ps1`. Each "Configure" step is preceded by a comment indicating
  which cmdlet in `build.ps1` it corresponds to. There may be a few additional
  comments to explain the differences between the GHA build and the `build.ps1`
  script.

on:
  workflow_call:
    inputs:
      build_os:
        required: true
        type: string

      build_arch:
