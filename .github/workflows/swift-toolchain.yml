          aws-region: ${{ vars.SCCACHE_AWS_REGION }}
          aws-arn: ${{ vars.SCCACHE_AWS_ARN }}
          disk-max-size: 1M
          disk-cache-key: ${{ steps.workspace_hash.outputs.hash }}-${{ matrix.os }}-${{ matrix.arch }}-cmark-gfm
      - name: Restore CAS
        uses: ./SourceCache/ci-build/.github/actions/restore-cas
        if: ${{ !inputs.use_host_toolchain }}
        with:
          s3-bucket: ${{ vars.SCCACHE_S3_BUCKET }}
          aws-region: ${{ vars.SCCACHE_AWS_REGION }}
          aws-arn: ${{ vars.SCCACHE_AWS_ARN }}
          cache-key: ${{ matrix.os }}-${{ matrix.arch }}-cmark-gfm

      - uses: actions/checkout@v4.2.2
        with:
          repository: swiftlang/swift-cmark
          ref: ${{ inputs.swift_cmark_revision }}
          path: ${{ github.workspace }}/SourceCache/cmark-gfm
          show-progress: false

      # build.ps1: Build-CMark
      - name: Configure cmark-gfm
        uses: ./SourceCache/ci-build/.github/actions/configure-cmake-project
        with:
          project-name: cmark-gfm
          swift-version: ${{ inputs.swift_version }}
          enable-caching: ${{ inputs.use_host_toolchain }}
          enable-cas: ${{ !inputs.use_host_toolchain }}
          debug-info: ${{ inputs.debug_info }}
          build-os: ${{ inputs.build_os }}
          build-arch: ${{ inputs.build_arch }}
          os: ${{ matrix.os }}
          arch: ${{ matrix.arch }}
          src-dir: ${{ github.workspace }}/SourceCache/cmark-gfm
          bin-dir: ${{ github.workspace }}/BinaryCache/cmark-gfm-${{ inputs.swift_cmark_version }}
          install-dir: ${{ github.workspace }}/BuildRoot/Library/cmark-gfm-${{ inputs.swift_cmark_version }}/usr
          c-compiler: ${{ inputs.use_host_toolchain && '$Compilers.MSVC.C' || '$Compilers.Pinned.C' }}
          cxx-compiler: ${{ inputs.use_host_toolchain && '$Compilers.MSVC.CXX' || '$Compilers.Pinned.CXX' }}
          cmake-defines: |
            @{
              'BUILD_SHARED_LIBS' = "YES";
              'BUILD_TESTING' = "NO";
              'CMAKE_INSTALL_SYSTEM_RUNTIME_LIBS_SKIP' = "YES";
            }
      - name: Build cmark-gfm
        run: cmake --build ${{ github.workspace }}/BinaryCache/cmark-gfm-${{ inputs.swift_cmark_version }}
      - name: Install cmark-gfm
        run: cmake --build ${{ github.workspace }}/BinaryCache/cmark-gfm-${{ inputs.swift_cmark_version }} --target install
      - uses: thebrowsercompany/gha-upload-tar-artifact@e18c33b1cd416d0d96a91dc6dce06219f98e4e27 # main
        with:
          name: ${{ matrix.os }}-${{ matrix.arch }}-cmark-gfm-${{ inputs.swift_cmark_version }}
          path: ${{ github.workspace }}/BuildRoot/Library/cmark-gfm-${{ inputs.swift_cmark_version }}/usr
      - name: Save CAS
        uses: ./SourceCache/ci-build/.github/actions/save-cas
        if: ${{ !inputs.use_host_toolchain }}
        with:
          s3-bucket: ${{ vars.SCCACHE_S3_BUCKET }}
          aws-region: ${{ vars.SCCACHE_AWS_REGION }}
          aws-arn: ${{ vars.SCCACHE_AWS_ARN }}
          cache-key: ${{ matrix.os }}-${{ matrix.arch }}-cmark-gfm

  build_tools:
    needs: [cmark_gfm]
    runs-on: ${{ inputs.default_build_runner }}

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(inputs.build_matrix) }}

    name: ${{ matrix.os }} ${{ matrix.arch }} Compiler Build Tools

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          ref: ${{ inputs.ci_build_revision }}
          path: ${{ github.workspace }}/SourceCache/ci-build
          show-progress: false
      - uses: ./SourceCache/ci-build/.github/actions/setup-build
        with:
          setup-vs-dev-env: true
          host-arch: ${{ matrix.arch }}
          swift-version: ${{ env.PINNED_BOOTSTRAP_TOOLCHAIN_VERSION }}
      - uses: seanmiddleditch/gha-setup-ninja@96bed6edff20d1dd61ecff9b75cc519d516e6401 # master
        if: inputs.build_os == 'Darwin'

      - name: Compute workspace hash
        id: workspace_hash
        run: |
          $stringAsStream = [System.IO.MemoryStream]::new()
          $writer = [System.IO.StreamWriter]::new($stringAsStream)
          $writer.write("${{ github.workspace }}")
          $writer.Flush()
          $stringAsStream.Position = 0
          $hash = (Get-FileHash -Algorithm SHA256 -InputStream $stringAsStream).Hash
          echo "hash=$hash" >> $env:GITHUB_OUTPUT
      - name: Setup sccache
        uses: ./SourceCache/ci-build/.github/actions/setup-sccache
        if: inputs.use_host_toolchain
        with:
          s3-bucket: ${{ vars.SCCACHE_S3_BUCKET }}
          aws-region: ${{ vars.SCCACHE_AWS_REGION }}
          aws-arn: ${{ vars.SCCACHE_AWS_ARN }}
          disk-max-size: 100M
          disk-cache-key: ${{ steps.workspace_hash.outputs.hash }}-${{ matrix.os }}-${{ matrix.arch }}-build_tools
      - name: Restore CAS
        uses: ./SourceCache/ci-build/.github/actions/restore-cas
        if: ${{ !inputs.use_host_toolchain }}
        with:
          s3-bucket: ${{ vars.SCCACHE_S3_BUCKET }}
          aws-region: ${{ vars.SCCACHE_AWS_REGION }}
          aws-arn: ${{ vars.SCCACHE_AWS_ARN }}
          cache-key: ${{ matrix.os }}-${{ matrix.arch }}-build_tools

      - uses: thebrowsercompany/gha-download-tar-artifact@59992d91335d4ecba543c8535f7d07238e42125d # main
        with:
          name: ${{ matrix.os }}-${{ matrix.arch }}-cmark-gfm-${{ inputs.swift_cmark_version }}
          path: ${{ github.workspace }}/BuildRoot/Library/cmark-gfm-${{ inputs.swift_cmark_version }}/usr

      - uses: actions/checkout@v4.2.2
        with:
          repository: swiftlang/llvm-project
          ref: ${{ inputs.llvm_project_revision }}
          path: ${{ github.workspace }}/SourceCache/llvm-project
          show-progress: false
      - uses: actions/checkout@v4.2.2
        with:
          repository: swiftlang/swift
          ref: ${{ inputs.swift_revision }}
          path: ${{ github.workspace }}/SourceCache/swift
          show-progress: false

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
          architecture: x64 # FIXME(#1004): Remove workaround installing x64 Python on ARM64 CI hosts

      # build.ps1: Build-BuildTools
      - name: Configure Tools
        uses: ./SourceCache/ci-build/.github/actions/configure-cmake-project
        with:
          project-name: Build Tools
          swift-version: ${{ inputs.swift_version }}
          enable-caching: ${{ inputs.use_host_toolchain }}
          enable-cas: ${{ !inputs.use_host_toolchain }}
          debug-info: ${{ inputs.debug_info }}
          build-os: ${{ inputs.build_os }}
          build-arch: ${{ inputs.build_arch }}
          os: ${{ matrix.os }}
          arch: ${{ matrix.arch }}
          src-dir: ${{ github.workspace }}/SourceCache/llvm-project/llvm
          bin-dir: ${{ github.workspace }}/BinaryCache/BuildTools
          c-compiler: ${{ inputs.use_host_toolchain && '$Compilers.MSVC.C' || '$Compilers.Pinned.C' }}
          cxx-compiler: ${{ inputs.use_host_toolchain && '$Compilers.MSVC.CXX' || '$Compilers.Pinned.CXX' }}
          use-asm-masm: ${{ inputs.use_host_toolchain }}
          cmake-defines: |
            @{
              'CMAKE_CROSSCOMPILING' = "NO";
              'CLANG_ENABLE_LIBXML2' = "NO";
              'LLDB_ENABLE_LIBXML2' = "NO";
              'LLDB_ENABLE_PYTHON' = "NO";
              'LLDB_INCLUDE_TESTS' = "NO";
              'LLDB_ENABLE_SWIFT_SUPPORT' = "NO";
              'LLVM_ENABLE_ASSERTIONS' = "NO";
              'LLVM_ENABLE_LIBEDIT' = "NO";
              'LLVM_ENABLE_LIBXML2' = "NO";
              'LLVM_ENABLE_PROJECTS' = "clang;clang-tools-extra;lldb";
              'LLVM_EXTERNAL_PROJECTS' = "swift";
              'LLVM_EXTERNAL_SWIFT_SOURCE_DIR' = "${{ github.workspace }}/SourceCache/swift";
              'SWIFT_BUILD_DYNAMIC_SDK_OVERLAY' = "NO";
              'SWIFT_BUILD_DYNAMIC_STDLIB' = "NO";
              'SWIFT_BUILD_HOST_DISPATCH' = "NO";
              'SWIFT_BUILD_LIBEXEC' = "NO";
              'SWIFT_BUILD_REGEX_PARSER_IN_COMPILER' = "NO";
              'SWIFT_BUILD_REMOTE_MIRROR' = "NO";
              'SWIFT_BUILD_SOURCEKIT' = "NO";
              'SWIFT_BUILD_STATIC_SDK_OVERLAY' = "NO";
              'SWIFT_BUILD_STATIC_STDLIB' = "NO";
              'SWIFT_BUILD_SWIFT_SYNTAX' = "NO";
              'SWIFT_ENABLE_DISPATCH' = "NO";
              'SWIFT_INCLUDE_APINOTES' = "NO";
              'SWIFT_INCLUDE_DOCS' = "NO";
              'SWIFT_INCLUDE_TESTS' = "NO";
              'cmark-gfm_DIR' = "${{ github.workspace }}/BuildRoot/Library/cmark-gfm-${{ inputs.swift_cmark_version }}/usr/lib/cmake";
            }
      - name: Build llvm-tblgen
        run: cmake --build ${{ github.workspace }}/BinaryCache/BuildTools --target llvm-tblgen
      - name: Build clang-tblgen
        run: cmake --build ${{ github.workspace }}/BinaryCache/BuildTools --target clang-tblgen
      - name: Build clang-tidy-confusable-chars-gen
        run: cmake --build ${{ github.workspace }}/BinaryCache/BuildTools --target clang-tidy-confusable-chars-gen
      - name: Build lldb-tblgen
        run: cmake --build ${{ github.workspace }}/BinaryCache/BuildTools --target lldb-tblgen
      - name: Build llvm-config
        run: cmake --build ${{ github.workspace }}/BinaryCache/BuildTools --target llvm-config
      - name: Build swift-def-to-strings-converter
        run: cmake --build ${{ github.workspace }}/BinaryCache/BuildTools --target swift-def-to-strings-converter
      - name: Build swift-serialize-diagnostics
        run: cmake --build ${{ github.workspace }}/BinaryCache/BuildTools --target swift-serialize-diagnostics
      - name: Build swift-compatibility-symbols
        run: cmake --build ${{ github.workspace }}/BinaryCache/BuildTools --target swift-compatibility-symbols

      - name: Copy binaries
        run: |
          $Suffix = if ( "${{ matrix.os }}" -eq "Windows" ) { ".exe" } else { "" }
          $Binaries = @(
            "llvm-tblgen",
            "clang-tblgen",
            "clang-tidy-confusable-chars-gen",
            "lldb-tblgen",
            "llvm-config",
            "swift-def-to-strings-converter",
            "swift-serialize-diagnostics",
            "swift-compatibility-symbols"
          )

          # Create the target folder.
          New-Item -ItemType Directory -Path "${{ github.workspace }}/BuildRoot/bin" -Force | Out-Null
          foreach ($Binary in $Binaries) {
            Copy-Item -Path "${{ github.workspace }}/BinaryCache/BuildTools/bin/${Binary}${Suffix}" -Destination "${{ github.workspace }}/BuildRoot/bin/${Binary}${Suffix}" -Force
          }

      - uses: thebrowsercompany/gha-upload-tar-artifact@e18c33b1cd416d0d96a91dc6dce06219f98e4e27 # main
        with:
          name: ${{ matrix.os }}-${{ matrix.arch }}-build-tools
          path: ${{ github.workspace }}/BuildRoot/bin

      - name: Save CAS
        uses: ./SourceCache/ci-build/.github/actions/save-cas
        if: ${{ !inputs.use_host_toolchain }}
        with:
          s3-bucket: ${{ vars.SCCACHE_S3_BUCKET }}
          aws-region: ${{ vars.SCCACHE_AWS_REGION }}
          aws-arn: ${{ vars.SCCACHE_AWS_ARN }}
          cache-key: ${{ matrix.os }}-${{ matrix.arch }}-build_tools

  early_swift_driver:
    runs-on: ${{ inputs.default_build_runner }}
    needs: [stage0-sqlite]

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(inputs.build_matrix) }}

    name: ${{ matrix.os }} ${{ matrix.arch }} early swift-driver

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          ref: ${{ inputs.ci_build_revision }}
          path: ${{ github.workspace }}/SourceCache/ci-build
          show-progress: false
      - uses: ./SourceCache/ci-build/.github/actions/setup-build
        id: setup-build
        with:
          setup-vs-dev-env: true
          host-arch: ${{ matrix.arch }}
          swift-version: ${{ env.PINNED_BOOTSTRAP_TOOLCHAIN_VERSION }}

      - name: Compute workspace hash
        id: workspace_hash
        shell: pwsh
        run: |
          $stringAsStream = [System.IO.MemoryStream]::new()
          $writer = [System.IO.StreamWriter]::new($stringAsStream)
          $writer.write("${{ github.workspace }}")
          $writer.Flush()
          $stringAsStream.Position = 0
          $hash = (Get-FileHash -Algorithm SHA256 -InputStream $stringAsStream).Hash
          echo "hash=$hash" >> $env:GITHUB_OUTPUT
      - name: Setup sccache
        uses: ./SourceCache/ci-build/.github/actions/setup-sccache
        if: inputs.use_host_toolchain
        with:
          s3-bucket: ${{ vars.SCCACHE_S3_BUCKET }}
          aws-region: ${{ vars.SCCACHE_AWS_REGION }}
          aws-arn: ${{ vars.SCCACHE_AWS_ARN }}
          disk-max-size: 500M
          disk-cache-key: ${{ steps.workspace_hash.outputs.hash }}-${{ matrix.os }}-${{ matrix.arch }}-${{ matrix.variant }}-early-swift-driver
      - name: Restore CAS
        uses: ./SourceCache/ci-build/.github/actions/restore-cas
        if: ${{ !inputs.use_host_toolchain }}
        with:
          s3-bucket: ${{ vars.SCCACHE_S3_BUCKET }}
          aws-region: ${{ vars.SCCACHE_AWS_REGION }}
          aws-arn: ${{ vars.SCCACHE_AWS_ARN }}
          cache-key: ${{ matrix.os }}-${{ matrix.arch }}-early-swift-driver

      - uses: actions/checkout@v4.2.2
        with:
          repository: swiftlang/swift-llbuild
          ref: ${{ inputs.swift_llbuild_revision }}
          path: ${{ github.workspace }}/SourceCache/llbuild
          show-progress: false
      - uses: actions/checkout@v4.2.2
        with:
          repository: swiftlang/swift-toolchain-sqlite
          ref: ${{ inputs.swift_toolchain_sqlite_revision }}
          path: ${{ github.workspace }}/SourceCache/swift-toolchain-sqlite
          show-progress: false
      - uses: actions/checkout@v4.2.2
        with:
          repository: swiftlang/swift-tools-support-core
          ref: ${{ inputs.swift_tools_support_core_revision }}
          path: ${{ github.workspace }}/SourceCache/swift-tools-support-core
          show-progress: false
      - uses: actions/checkout@v4.2.2
        with:
          repository: apple/swift-argument-parser
          ref: ${{ inputs.swift_argument_parser_revision }}
          path: ${{ github.workspace }}/SourceCache/swift-argument-parser
          show-progress: false
      - uses: actions/checkout@v4.2.2
        with:
          repository: swiftlang/swift-driver
          ref: ${{ inputs.swift_driver_revision }}
          path: ${{ github.workspace }}/SourceCache/swift-driver
          show-progress: false

      - uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.os }}-${{ matrix.arch }}-stage0-sqlite-${{ inputs.swift_toolchain_sqlite_version }}
          path: ${{ github.workspace }}/BinaryCache/Library/stage0-sqlite-${{ inputs.swift_toolchain_sqlite_version }}/usr

      - name: Setup SDK context
        id: setup-context
        run: |
          if ("${{ matrix.os }}" -eq "Windows") {
              $sdkRoot = Split-Path -Parent ${env:SDKROOT}
              $sdkRoot = Join-Path $sdkRoot "Windows.sdk"
              $sdkRoot = cygpath -m ${sdkRoot}
          } else {
              $sdkRoot = "/Library/Developer/CommandLineTools/SDKs/MacOSX.sdk"
          }
          Write-Output "sdkroot=${sdkRoot}" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      # build.ps1: Build-EarlySwiftDriver
      - name: Configure early swift-driver
        uses: ./SourceCache/ci-build/.github/actions/configure-cmake-project
        with:
          project-name: Compilers
          swift-version: ${{ inputs.swift_version }}
          enable-caching: ${{ inputs.use_host_toolchain }}
          enable-cas: ${{ !inputs.use_host_toolchain }}
          debug-info: ${{ inputs.debug_info }}
          build-os: ${{ inputs.build_os }}
          build-arch: ${{ inputs.build_arch }}
          os: ${{ matrix.os }}
          arch: ${{ matrix.arch }}
          src-dir: ${{ github.workspace }}/SourceCache/swift-driver
          bin-dir: ${{ github.workspace }}/BinaryCache/swift-driver
          swift-sdk-path: ${{ steps.setup-context.outputs.sdkroot }}
          c-compiler: '$Compilers.Pinned.C'
          cxx-compiler: '$Compilers.Pinned.CXX'
          swift-compiler: '$Compilers.Pinned.Swift'
          cmake-defines: |
            @{
              'BUILD_SHARED_LIBS' = "NO";
              'BUILD_TESTING' = "NO";
              'CMAKE_STATIC_LIBRARY_PREFIX_Swift' = "lib";
              # TODO(compnerd) - remove `-Xfrontend -use-static-resource-dir` - this is inferred by the `-static-stdlib`.
              'CMAKE_Swift_FLAGS' = @("-static-stdlib", "-Xfrontend", "-use-static-resource-dir");
              'SWIFT_DRIVER_BUILD_TOOLS' = "NO";
              'SQLite3_INCLUDE_DIR' = "${{ github.workspace }}/BinaryCache/Library/stage0-sqlite-${{ inputs.swift_toolchain_sqlite_version }}/usr/include";
              'SQLite3_LIBRARY' = "${{ github.workspace }}/BinaryCache/Library/stage0-sqlite-${{ inputs.swift_toolchain_sqlite_version }}/usr/lib/SQLite3.lib";
            }

      - name: Build early swift-driver
        run: |
          cmake --build ${{ github.workspace }}/BinaryCache/swift-driver

      - name: Copy binaries
        run: |
          $ExeSuffix = if ("${{ matrix.os }}" -eq "Windows") { ".exe" } else { "" }
          $SourceBinDir = Join-Path "${{ github.workspace }}" "BinaryCache" "swift-driver" "bin"
          $InstallBinDir = Join-Path "${{ github.workspace }}" "BuildRoot" "bin"

          # Create the target folder.
          New-Item -ItemType Directory -Path $InstallBinDir -Force

          # Copy binaries.
          foreach ($bin in @("swift-driver", "swift-help")) {
              $binName = "${bin}${ExeSuffix}"
              $binPath = Join-Path $InstallBinDir $binName
              Copy-Item -Path "${SourceBinDir}/${binName}" -Destination $binPath -Force
          }

      - uses: thebrowsercompany/gha-upload-tar-artifact@e18c33b1cd416d0d96a91dc6dce06219f98e4e27 # main
        with:
          name: ${{ matrix.os }}-${{ matrix.arch }}-early-swift-driver
          path: ${{ github.workspace }}/BuildRoot

      - name: Save CAS
        uses: ./SourceCache/ci-build/.github/actions/save-cas
        if: ${{ !inputs.use_host_toolchain }}
        with:
          s3-bucket: ${{ vars.SCCACHE_S3_BUCKET }}
          aws-region: ${{ vars.SCCACHE_AWS_REGION }}
          aws-arn: ${{ vars.SCCACHE_AWS_ARN }}
          cache-key: ${{ matrix.os }}-${{ matrix.arch }}-early-swift-driver

  # build.ps1: Build-Compilers Stage0Compilers
  stage0-compiler:
    needs: [stage0-libxml2, cmark_gfm, build_tools, early_swift_driver]
    runs-on: ${{ inputs.compilers_build_runner }}

    name: ${{ inputs.build_os }} ${{ inputs.build_arch }} Stage0 Compiler

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          ref: ${{ inputs.ci_build_revision }}
          path: ${{ github.workspace }}/SourceCache/ci-build
          show-progress: false
      - uses: ./SourceCache/ci-build/.github/actions/setup-build
        with:
          setup-vs-dev-env: ${{ inputs.build_os == 'Windows' }}
          host-arch: ${{ inputs.build_arch }}
          swift-version: ${{ env.PINNED_BOOTSTRAP_TOOLCHAIN_VERSION }}

      - name: Compute workspace hash
        id: workspace_hash
        shell: pwsh
        run: |
          $stringAsStream = [System.IO.MemoryStream]::new()
          $writer = [System.IO.StreamWriter]::new($stringAsStream)
          $writer.write("${{ github.workspace }}")
          $writer.Flush()
          $stringAsStream.Position = 0
          $hash = (Get-FileHash -Algorithm SHA256 -InputStream $stringAsStream).Hash
          echo "hash=$hash" >> $env:GITHUB_OUTPUT
      - name: Setup sccache
        uses: ./SourceCache/ci-build/.github/actions/setup-sccache
        if: inputs.use_host_toolchain
        with:
          s3-bucket: ${{ vars.SCCACHE_S3_BUCKET }}
          aws-region: ${{ vars.SCCACHE_AWS_REGION }}
          aws-arn: ${{ vars.SCCACHE_AWS_ARN }}
          disk-max-size: 500M
          disk-cache-key: ${{ steps.workspace_hash.outputs.hash }}-${{ matrix.os }}-${{ matrix.arch }}-stage0-compiler
      - name: Restore CAS
        uses: ./SourceCache/ci-build/.github/actions/restore-cas
        if: ${{ !inputs.use_host_toolchain }}
        with:
          s3-bucket: ${{ vars.SCCACHE_S3_BUCKET }}
          aws-region: ${{ vars.SCCACHE_AWS_REGION }}
          aws-arn: ${{ vars.SCCACHE_AWS_ARN }}
          cache-key: ${{ matrix.os }}-${{ matrix.arch }}-stage0-compiler

      - uses: thebrowsercompany/gha-download-tar-artifact@59992d91335d4ecba543c8535f7d07238e42125d # main
        with:
          name: ${{ matrix.os }}-${{ matrix.arch }}-build-tools
          path: ${{ github.workspace }}/BinaryCache/BuildTools/bin
      - uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.os }}-${{ matrix.arch }}-stage0-libxml2-${{ inputs.libxml2_version }}
          path: ${{ github.workspace }}/BinaryCache/Library/stage0-libxml2-${{ inputs.libxml2_version }}/usr
      - uses: thebrowsercompany/gha-download-tar-artifact@59992d91335d4ecba543c8535f7d07238e42125d # main
        with:
          name: ${{ matrix.os }}-${{ matrix.arch }}-cmark-gfm-${{ inputs.swift_cmark_version }}
          path: ${{ github.workspace }}/BinaryCache/Library/cmark-gfm-${{ inputs.swift_cmark_version }}/usr
      - uses: thebrowsercompany/gha-download-tar-artifact@59992d91335d4ecba543c8535f7d07238e42125d # main
        with:
          name: ${{ matrix.os }}-${{ matrix.arch }}-early-swift-driver
          path: ${{ github.workspace }}/BinaryCache/swift-driver

      - uses: actions/checkout@v4.2.2
        with:
          repository: swiftlang/llvm-project
          ref: ${{ inputs.llvm_project_revision }}
          path: ${{ github.workspace }}/SourceCache/llvm-project
          show-progress: false
      - uses: actions/checkout@v4.2.2
        with:
          repository: swiftlang/swift
          ref: ${{ inputs.swift_revision }}
          path: ${{ github.workspace }}/SourceCache/swift
          show-progress: false
      - uses: actions/checkout@v4.2.2
        with:
          repository: swiftlang/swift-experimental-string-processing
          ref: ${{ inputs.swift_experimental_string_processing_revision }}
          path: ${{ github.workspace }}/SourceCache/swift-experimental-string-processing
          show-progress: false
      - uses: actions/checkout@v4.2.2
        with:
          repository: swiftlang/swift-syntax
          ref: ${{ inputs.swift_syntax_revision }}
          path: ${{ github.workspace }}/SourceCache/swift-syntax
          show-progress: false
      - uses: actions/checkout@v4.2.2
        with:
          repository: apple/swift-corelibs-libdispatch
          ref: ${{ inputs.swift_corelibs_libdispatch_revision }}
          path: ${{ github.workspace }}/SourceCache/swift-corelibs-libdispatch
          show-progress: false

      - uses: actions/setup-python@v5
        id: python
        with:
          python-version: ${{ inputs.python_version }}
          architecture: x64 # FIXME(#1004): Remove workaround installing x64 Python on ARM64 CI hosts

      - name: Download and expand Python
        env:
          INPUT_PYTHON_DOWNLOAD_LOCATIONS: ${{ inputs.python_download_locations }}
          INPUT_PYTHON_VERSION: ${{ inputs.python_version }}
        run: |
          function DownloadAndVerify($URL, $Destination, $Hash) {
            New-Item -ItemType Directory (Split-Path -Path $Destination -Parent) -ErrorAction Ignore | Out-Null
            $WebClient = New-Object Net.WebClient
            $WebClient.DownloadFile($URL, $Destination)
            $ExpectedHash = $Hash.ToUpperInvariant()
            $SHA256 = (Get-FileHash -Path $Destination -Algorithm SHA256).Hash.ToUpperInvariant()
            if ($SHA256 -ne $ExpectedHash) {
              throw "SHA256 mismatch ($SHA256 vs $Hash) for $URL"
            }
          }

          $KnownPythons = $env:INPUT_PYTHON_DOWNLOAD_LOCATIONS | ConvertFrom-Json
          $version = $env:INPUT_PYTHON_VERSION
          $archKey = "${{ inputs.build_arch }}".ToUpper()
          $pythonInfo = $KnownPythons."$version"."$archKey"
          if ($null -eq $pythonInfo) {
            throw "No python download info for version $version and architecture $archKey"
          }
          Write-Host "Downloading Python $version for $archKey"

          # Download the Python package
          $packagePath = "${{ github.workspace }}\BinaryCache\Python-$archKey-$version.zip"
          DownloadAndVerify -URL $pythonInfo.URL -Destination $packagePath -Hash $pythonInfo.SHA256
          Write-Host "Downloaded Python $version for $archKey to $packagePath"

          # Extract the Python package
          $extractRoot = "${{ github.workspace }}\BuildRoot\Library\Developer\Python-$archKey-$version"
          New-Item -ItemType Directory -Path $extractRoot -ErrorAction Ignore | Out-Null
          Expand-Archive -Path $packagePath -DestinationPath $extractRoot -Force
          Write-Host "Extracted Python $version for $archKey to $extractRoot"

          # Export Python Location
          echo "PYTHON_LOCATION=$extractRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Setup context
        id: setup-context
        env:
          INPUT_PYTHON_VERSION: ${{ inputs.python_version }}
        run: |
          $PythonVersion = $env:INPUT_PYTHON_VERSION
          $PythonMajor = ([System.Version]$PythonVersion).Major
          $PythonMinor = ([System.Version]$PythonVersion).Minor

          $CLANG_LOCATION = cygpath -m $(Split-Path (Get-Command swiftc).Source)
          $SDKROOT = cygpath -m ${env:SDKROOT}
          $LIBPYTHON_PATH = "${env:PYTHON_LOCATION}/tools/libs/python${PythonMajor}${PythonMinor}.lib"
          $PYTHON_INCLUDE_DIR = "${env:PYTHON_LOCATION}/tools/include"
          $PYTHON_BINARY = "python.exe"

          # build.ps1: Get-PinnedToolchainRuntime
          $PinnedRuntimeDir = Get-ChildItem -Path "${env:LOCALAPPDATA}\Programs\Swift\Runtimes" -Directory |
            Sort-Object Name -Descending | Select-Object -First 1
          if (-not $PinnedRuntimeDir) {
            throw "Could not locate pinned toolchain runtime under ${env:LOCALAPPDATA}\Programs\Swift\Runtimes"
          }
          $PINNED_RUNTIME_BIN = Join-Path $PinnedRuntimeDir.FullName "usr\bin"

          $Cpu = switch ("${{ inputs.build_arch }}") {
            "amd64" { "x86_64" }
            "arm64" { "aarch64" }
            default { throw "Unsupported build_arch: ${{ inputs.build_arch }}" }
          }
          $Triple = "$Cpu-unknown-windows-msvc"

          $RamBytes = (Get-CimInstance -ClassName Win32_ComputerSystem).TotalPhysicalMemory
          $RamGB = [math]::Round($RamBytes / 1GB)
          $LinkJobs = [math]::Max(2, [math]::Floor($RamGB / 24))

          $Context = @"
          clang-location=${CLANG_LOCATION}
          libpython-path=${LIBPYTHON_PATH}
          python-include-dir=${PYTHON_INCLUDE_DIR}
          python-binary=${PYTHON_BINARY}
          sdkroot=${SDKROOT}
          pinned-runtime-bin=${PINNED_RUNTIME_BIN}
          cpu=${Cpu}
          triple=${Triple}
          link-jobs=${LinkJobs}
          "@
          Write-Output $Context | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Configure Stage 0 Compiler
        uses: ./SourceCache/ci-build/.github/actions/configure-cmake-project
        with:
          project-name: Stage0 Compiler
          swift-version: ${{ inputs.swift_version }}
          enable-caching: ${{ inputs.use_host_toolchain }}
          enable-cas: ${{ !inputs.use_host_toolchain }}
          debug-info: ${{ inputs.debug_info }}
          build-os: ${{ inputs.build_os }}
          build-arch: ${{ inputs.build_arch }}
          os: ${{ matrix.os }}
          arch: ${{ matrix.arch }}
          src-dir: ${{ github.workspace }}/SourceCache/llvm-project/llvm
          bin-dir: ${{ github.workspace }}/BinaryCache/stage0/build
          install-dir: ${{ github.workspace }}/BinaryCache/stage0/Library/Developer/Toolchains/${{ inputs.swift_version }}+Asserts/usr
          swift-sdk-path: ${{ steps.setup-context.outputs.sdkroot }}
          c-compiler: ${{ inputs.use_host_toolchain && '$Compilers.MSVC.C' || '$Compilers.Pinned.C' }}
          cxx-compiler: ${{ inputs.use_host_toolchain && '$Compilers.MSVC.CXX' || '$Compilers.Pinned.CXX' }}
          swift-compiler: '$Compilers.Pinned.Swift'
          cache-script: ${{ github.workspace }}/SourceCache/swift/cmake/caches/Windows-Bootstrap-Stage0-${{ steps.setup-context.outputs.cpu }}.cmake
          cmake-defines: |
            @{
              'SWIFT_BUILD_DYNAMIC_SDK_OVERLAY' = "NO";
              'SWIFT_BUILD_DYNAMIC_STDLIB' = "NO";
              'SWIFT_BUILD_LIBEXEC' = "NO";
              'SWIFT_BUILD_REMOTE_MIRROR' = "NO";
              'SWIFT_NATIVE_SWIFT_TOOLS_PATH' = "${{ github.workspace }}/BinaryCache/BuildTools/bin";

              'CLANG_TABLEGEN' = "${{ github.workspace }}/BinaryCache/BuildTools/bin/clang-tblgen${ExeSuffix}";
              'CLANG_TIDY_CONFUSABLE_CHARS_GEN' = "${{ github.workspace }}/BinaryCache/BuildTools/bin/clang-tidy-confusable-chars-gen${ExeSuffix}";
              'CMAKE_STATIC_LIBRARY_PREFIX_Swift' = "lib";
              'LibXml2_DIR' = "${{ github.workspace }}/BinaryCache/Library/stage0-libxml2-${{ inputs.libxml2_version }}/usr/lib/cmake/libxml2-${{ inputs.libxml2_version }}";
              'LLDB_LIBXML2_VERSION' = "${{ inputs.libxml2_version }}";
              'LLDB_PYTHON_EXE_RELATIVE_PATH' = "${{ steps.setup-context.outputs.python-binary }}";
              'LLDB_PYTHON_EXT_SUFFIX' = ".pyd";
              'LLDB_PYTHON_RELATIVE_PATH' = "lib/site-packages";
              'LLDB_PYTHON_DLL_RELATIVE_PATH' = "../../../../Python-${{ inputs.python_version }}/usr/bin";
              'LLDB_TABLEGEN' = "${{ github.workspace }}/BinaryCache/BuildTools/bin/lldb-tblgen${ExeSuffix}";
              'LLVM_CONFIG_PATH' = "${{ github.workspace }}/BinaryCache/BuildTools/bin/llvm-config${ExeSuffix}";
              'LLVM_ENABLE_ASSERTIONS' = "YES";
              'LLVM_ENABLE_LLD' = "${{ inputs.use_host_toolchain && 'NO' || 'YES' }}";
              'LLVM_EXTERNAL_SWIFT_SOURCE_DIR' = "${{ github.workspace }}/SourceCache/swift";
              'LLVM_HOST_TRIPLE' = "${{ steps.setup-context.outputs.triple }}";
              'LLVM_NATIVE_TOOL_DIR' = "${{ github.workspace }}/BinaryCache/BuildTools/bin";
              'LLVM_TABLEGEN' = "${{ github.workspace }}/BinaryCache/BuildTools/bin/llvm-tblgen${ExeSuffix}";
              'LLVM_USE_HOST_TOOLS' = "NO";
              'Python3_EXECUTABLE' = "${{ steps.python.outputs.python-path }}";
              'Python3_INCLUDE_DIR' = "${{ steps.setup-context.outputs.python-include-dir }}";
              'Python3_LIBRARY' = "${{ steps.setup-context.outputs.libpython-path }}";
              'Python3_ROOT_DIR' = $env:pythonLocation;
              'Python3_VERSION' = "${{ inputs.python_version }}";
              'SWIFT_TOOLCHAIN_VERSION' = "${{ inputs.swift_version }} ${{ inputs.swift_tag }}";
              'SWIFT_BUILD_SWIFT_SYNTAX' = "YES";
              'SWIFT_CLANG_LOCATION' = "${{ steps.setup-context.outputs.clang-location }}";
              'SWIFT_EARLY_SWIFT_DRIVER_BUILD' = "${{ github.workspace }}/BinaryCache/swift-driver/bin";
              'SWIFT_ENABLE_EXPERIMENTAL_CONCURRENCY' = "YES";
              'SWIFT_ENABLE_EXPERIMENTAL_CXX_INTEROP' = "YES";
              'SWIFT_ENABLE_EXPERIMENTAL_DIFFERENTIABLE_PROGRAMMING' = "YES";
              'SWIFT_ENABLE_EXPERIMENTAL_DISTRIBUTED' = "YES";
              'SWIFT_ENABLE_EXPERIMENTAL_OBSERVATION' = "YES";
              'SWIFT_ENABLE_EXPERIMENTAL_STRING_PROCESSING' = "YES";
              'SWIFT_ENABLE_RUNTIME_MODULE' = "YES";
              'SWIFT_ENABLE_BACKTRACING' = "YES";
              'SWIFT_ENABLE_SYNCHRONIZATION' = "YES";
              'SWIFT_ENABLE_VOLATILE' = "YES";
              'SWIFT_PATH_TO_LIBDISPATCH_SOURCE' = "${{ github.workspace }}/SourceCache/swift-corelibs-libdispatch";
              'SWIFT_PATH_TO_STRING_PROCESSING_SOURCE' = "${{ github.workspace }}/SourceCache/swift-experimental-string-processing";
              'SWIFT_PATH_TO_SWIFT_SDK' = "${{ steps.setup-context.outputs.sdkroot }}";
              'SWIFT_PATH_TO_SWIFT_SYNTAX_SOURCE' = "${{ github.workspace }}/SourceCache/swift-syntax";
              'SWIFT_STDLIB_ASSERTIONS' = "NO";
              'SWIFTSYNTAX_ENABLE_ASSERTIONS' = "NO";
              'cmark-gfm_DIR' = "${{ github.workspace }}/BinaryCache/Library/cmark-gfm-${{ inputs.swift_cmark_version }}/usr/lib/cmake";

              'LLVM_PARALLEL_LINK_JOBS' = "${{ steps.setup-context.outputs.link-jobs }}";
              'SWIFT_PARALLEL_LINK_JOBS' = "${{ steps.setup-context.outputs.link-jobs }}";
            }

      - name: Build Stage 0 Compiler Distribution
        run: cmake --build ${{ github.workspace }}/BinaryCache/stage0/build --target distribution

      - name: Install Stage 0 Compiler Distribution
        run: cmake --build ${{ github.workspace }}/BinaryCache/stage0/build --target install-distribution-stripped

      - name: Copy cmark-gfm shared libraries
        run: |
          Copy-Item -Path "${{ github.workspace }}/BinaryCache/Library/cmark-gfm-${{ inputs.swift_cmark_version }}/usr/bin/*.dll" -Destination "${{ github.workspace }}/BinaryCache/stage0/Library/Developer/Toolchains/${{ inputs.swift_version }}+Asserts/usr/bin"

      # build.ps1: Copy-WindowsRuntimeToToolchain
      - name: Copy Windows Runtime to Toolchain
        run: |
          $Stage0Bin = "${{ github.workspace }}/BinaryCache/stage0/Library/Developer/Toolchains/${{ inputs.swift_version }}+Asserts/usr/bin"
          New-Item -ItemType Directory -Path $Stage0Bin -Force | Out-Null
          $RuntimeFiles = @(Get-ChildItem -Path "${{ steps.setup-context.outputs.pinned-runtime-bin }}" -File | Sort-Object Name)
          if (-not ($RuntimeFiles | Where-Object { $_.Extension -ieq ".dll" })) {
            throw "No DLLs found under '${{ steps.setup-context.outputs.pinned-runtime-bin }}'"
          }
          foreach ($File in $RuntimeFiles) {
            Copy-Item -Force -Path $File.FullName -Destination $Stage0Bin
          }

      - name: Upload Stage 0 Compilers
        uses: thebrowsercompany/gha-upload-tar-artifact@e18c33b1cd416d0d96a91dc6dce06219f98e4e27 # main
        with:
          name: ${{ inputs.build_os }}-${{ inputs.build_arch }}-stage0-compiler
          path: ${{ github.workspace }}/BinaryCache/stage0/Library

      - name: Save CAS
        uses: ./SourceCache/ci-build/.github/actions/save-cas
        if: ${{ !inputs.use_host_toolchain }}
        with:
          s3-bucket: ${{ vars.SCCACHE_S3_BUCKET }}
          aws-region: ${{ vars.SCCACHE_AWS_REGION }}
          aws-arn: ${{ vars.SCCACHE_AWS_ARN }}
          cache-key: ${{ inputs.build_os }}-${{ inputs.build_arch }}-stage0-compiler

  bootstrap-sdk:
    needs: [stage0-compiler]
    runs-on: ${{ inputs.default_build_runner }}

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(inputs.build_matrix) }}

    name: ${{ matrix.os }} ${{ matrix.arch }} Bootstrap SDK

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          ref: ${{ inputs.ci_build_revision }}
          path: ${{ github.workspace }}/SourceCache/ci-build
          show-progress: false
      - uses: ./SourceCache/ci-build/.github/actions/setup-build
        with:
          setup-vs-dev-env: ${{ matrix.os == 'Windows' }}
          host-arch: ${{ matrix.arch }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
          architecture: x64 # FIXME(#1004): Remove workaround installing x64 Python on ARM64 CI hosts

      - name: Restore CAS
        uses: ./SourceCache/ci-build/.github/actions/restore-cas
        with:
          s3-bucket: ${{ vars.SCCACHE_S3_BUCKET }}
          aws-region: ${{ vars.SCCACHE_AWS_REGION }}
          aws-arn: ${{ vars.SCCACHE_AWS_ARN }}
          cache-key: ${{ matrix.os }}-${{ matrix.arch }}-bootstrap-sdk

      - name: Download Compiler
        uses: thebrowsercompany/gha-download-tar-artifact@59992d91335d4ecba543c8535f7d07238e42125d # main
        with:
          name: ${{ matrix.os }}-${{ matrix.arch }}-stage0-compiler
          path: ${{ github.workspace }}/BinaryCache/stage0/Library

      - uses: actions/checkout@v4.2.2
        with:
          repository: swiftlang/swift
          ref: ${{ inputs.swift_revision }}
          path: ${{ github.workspace }}/SourceCache/swift
          show-progress: false
      - uses: actions/checkout@v4.2.2
        with:
          repository: apple/swift-corelibs-libdispatch
          ref: ${{ inputs.swift_corelibs_libdispatch_revision }}
          path: ${{ github.workspace }}/SourceCache/swift-corelibs-libdispatch
          show-progress: false

      - name: Setup environment
        run: |
          $RTLPath = cygpath -w "${{ github.workspace }}/BinaryCache/stage0/Library/Developer/Platforms/${{ matrix.os }}.platform/Developer/SDKs/${{ matrix.os }}.sdk/usr/bin"
          echo ${RTLPath} | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Run Resync
        run: |
          cd ${{ github.workspace }}/SourceCache/swift/Runtimes
          cmake -P Resync.cmake

      # build.ps1: Build-CDispatch
      - name: Configure CDispatch
        uses: ./SourceCache/ci-build/.github/actions/configure-cmake-project
        with:
          project-name: Bootstrap libdispatch-c
          swift-version: ${{ inputs.swift_version }}
          enable-caching: false
          enable-cas: true
          debug-info: ${{ inputs.debug_info }}
          build-os: ${{ inputs.build_os }}
          build-arch: ${{ inputs.build_arch }}
          os: ${{ matrix.os }}
          arch: ${{ matrix.arch }}
          src-dir: ${{ github.workspace }}/SourceCache/swift-corelibs-libdispatch 
          bin-dir: ${{ github.workspace }}/BinaryCache/bootstrap/libdispatch-c 
          c-compiler: '$Compilers.Stage0.GNUC'
          cxx-compiler: '$Compilers.Stage0.GNUCXX'
          cmake-defines: |
            @{
              'BUILD_SHARED_LIBS' = "YES";
              'BUILD_TESTING' = "NO";
              'ENABLE_SWIFT' = "NO";
            }
      - name: Build CDispatch
        run: |
          cmake --build ${{ github.workspace }}/BinaryCache/bootstrap/libdispatch-c

      # build.ps1: Build-SDK
      - name: Configure Boostrap Runtime
        uses: ./SourceCache/ci-build/.github/actions/configure-cmake-project
        with:
          project-name: Bootstrap Runtime
          swift-version: ${{ inputs.swift_version }}
          enable-caching: false
          enable-cas: true
          debug-info: ${{ inputs.debug_info }}
          build-os: ${{ inputs.build_os }}
          build-arch: ${{ inputs.build_arch }}
          os: ${{ matrix.os }}
          arch: ${{ matrix.arch }}
          src-dir: ${{ github.workspace }}/SourceCache/swift/Runtimes/Core
          bin-dir: ${{ github.workspace }}/BinaryCache/bootstrap/Runtime 
          install-dir: ${{ github.workspace }}/BuildRoot/bootstrap/Library/Developer/Platforms/${{ matrix.os }}.platform/Developer/SDKs/${{ matrix.os }}.sdk/usr
          c-compiler: '$Compilers.Stage0.GNUC'
          cxx-compiler: '$Compilers.Stage0.GNUCXX'
          swift-compiler: '$Compilers.Stage0.Swift'
          cmake-defines: |
            @{
              'BUILD_SHARED_LIBS' = "NO";
              'CMAKE_STATIC_LIBRARY_PREFIX_Swift' = "lib";
              'dispatch_DIR' = "${{ github.workspace }}/BinaryCache/bootstrap/libdispatch-c/cmake/modules";
              # FIXME(compnerd) remove this once the default option is flipped to `ON`.
              'SwiftCore_ENABLE_BACKTRACING' = "YES";
              # FIXME(compnerd) remove this once the default option is flipped to `ON`.
              'SwiftCore_ENABLE_CONCURRENCY' = "YES";
              # FIXME(compnerd) remove this once the default option is flipped to `ON`.
              'SwiftCore_ENABLE_REMOTE_MIRROR' = "YES";
              # FIXME(compnerd) this currently causes a build failure on Windows, but
              # this should be enabled when building the dynamic runtime.
              'SwiftCore_ENABLE_LIBRARY_EVOLUTION' = "NO";
            }
      - name: Build Bootstrap Runtime
        run: |
          cmake --build ${{ github.workspace }}/BinaryCache/bootstrap/Runtime
      - name: Install Bootstrap Runtime
        run: |
          cmake --build ${{ github.workspace }}/BinaryCache/bootstrap/Runtime --target install

      # build.ps1: Build-SDK
      - name: Configure Boostrap Overlay
        uses: ./SourceCache/ci-build/.github/actions/configure-cmake-project
        with:
          project-name: Bootstrap Overlay
          swift-version: ${{ inputs.swift_version }}
          enable-caching: false
          enable-cas: true
          debug-info: ${{ inputs.debug_info }}
          build-os: ${{ inputs.build_os }}
          build-arch: ${{ inputs.build_arch }}
          os: ${{ matrix.os }}
          arch: ${{ matrix.arch }}
          src-dir: ${{ github.workspace }}/SourceCache/swift/Runtimes/Overlay
          bin-dir: ${{ github.workspace }}/BinaryCache/bootstrap/Overlay
          install-dir: ${{ github.workspace }}/BuildRoot/bootstrap/Library/Developer/Platforms/${{ matrix.os }}.platform/Developer/SDKs/${{ matrix.os }}.sdk/usr
          c-compiler: '$Compilers.Stage0.GNUC'
          cxx-compiler: '$Compilers.Stage0.GNUCXX'
          swift-compiler: '$Compilers.Stage0.Swift'
          cmake-defines: |
            @{
              'BUILD_SHARED_LIBS' = "NO";
              'CMAKE_STATIC_LIBRARY_PREFIX_Swift' = "lib";
              'SwiftCore_DIR' = "${{ github.workspace }}/BinaryCache/bootstrap/Runtime/cmake/SwiftCore";
              'SwiftOverlay_ENABLE_LIBRARY_EVOLUTION' = "NO";
              # FIXME(compnerd) this currently causes a build failure on Windows, but
              # this should be enabled when building the dynamic runtime.
              'SwiftOverlay_ENABLE_CXX_INTEROP' = "YES";
            }
      - name: Build Bootstrap Overlay
        run: |
          cmake --build ${{ github.workspace }}/BinaryCache/bootstrap/Overlay
      - name: Install Bootstrap Overlay
        run: |
          cmake --build ${{ github.workspace }}/BinaryCache/bootstrap/Overlay --target install

      # build.ps1: Build-SDK
      - name: Configure Bootstrap String Processing
        uses: ./SourceCache/ci-build/.github/actions/configure-cmake-project
        with:
          project-name: Bootstrap String Processing
          swift-version: ${{ inputs.swift_version }}
          enable-caching: false
          enable-cas: true
          debug-info: ${{ inputs.debug_info }}
          build-os: ${{ inputs.build_os }}
          build-arch: ${{ inputs.build_arch }}
          os: ${{ matrix.os }}
          arch: ${{ matrix.arch }}
          src-dir: ${{ github.workspace }}/SourceCache/swift/Runtimes/Supplemental/StringProcessing
          bin-dir: ${{ github.workspace }}/BinaryCache/bootstrap/StringProcessing
          install-dir: ${{ github.workspace }}/BuildRoot/bootstrap/Library/Developer/Platforms/${{ matrix.os }}.platform/Developer/SDKs/${{ matrix.os }}.sdk/usr
          c-compiler: '$Compilers.Stage0.GNUC'
          cxx-compiler: '$Compilers.Stage0.GNUCXX'
          swift-compiler: '$Compilers.Stage0.Swift'
          cmake-defines: |
            @{
              'BUILD_SHARED_LIBS' = "NO";
              'CMAKE_STATIC_LIBRARY_PREFIX_Swift' = "lib";
              'SwiftCore_DIR' = "${{ github.workspace }}/BinaryCache/bootstrap/Runtime/cmake/SwiftCore";
              # FIXME(compnerd) this currently causes a build failure on Windows, but
              # this should be enabled when building the dynamic runtime.
              'SwiftStringProcessing_ENABLE_LIBRARY_EVOLUTION' = "NO";
            }
      - name: Build Bootstrap String Processing
        run: |
          cmake --build ${{ github.workspace }}/BinaryCache/bootstrap/StringProcessing
      - name: Install Bootstrap String Processing
        run: |
          cmake --build ${{ github.workspace }}/BinaryCache/bootstrap/StringProcessing --target install

      # build.ps1: Build-SDK
      - name: Configure Bootstrap Dispatch
        uses: ./SourceCache/ci-build/.github/actions/configure-cmake-project
        with:
          project-name: Bootstrap Dispatch
          swift-version: ${{ inputs.swift_version }}
          enable-caching: false
          enable-cas: true
          debug-info: ${{ inputs.debug_info }}
          build-os: ${{ inputs.build_os }}
          build-arch: ${{ inputs.build_arch }}
          os: ${{ matrix.os }}
          arch: ${{ matrix.arch }}
          src-dir: ${{ github.workspace }}/SourceCache/swift-corelibs-libdispatch
          bin-dir: ${{ github.workspace }}/BinaryCache/bootstrap/Dispatch
          install-dir: ${{ github.workspace }}/BuildRoot/bootstrap/Library/Developer/Platforms/${{ matrix.os }}.platform/Developer/SDKs/${{ matrix.os }}.sdk/usr
          swift-compiler: '$Compilers.Stage0.Swift'
          swift-sdk-path: ${{ github.workspace }}/BuildRoot/bootstrap/Library/Developer/Platforms/${{ matrix.os }}.platform/Developer/SDKs/${{ matrix.os }}.sdk
          cmake-defines: |
            @{
               'BUILD_SHARED_LIBS' = "NO";
               'CMAKE_STATIC_LIBRARY_PREFIX_Swift' = "lib";
               'ENABLE_SWIFT' = "YES";
                'dispatch_INSTALL_ARCH_SUBDIR' = "YES";
              }
      - name: Build Bootstrap Dispatch
        run: |
          cmake --build ${{ github.workspace }}/BinaryCache/bootstrap/Dispatch
      - name: Install Bootstrap Dispatch
        run: |
          cmake --build ${{ github.workspace }}/BinaryCache/bootstrap/Dispatch --target install

      - name: Repair SDK Headers
        run: |
          $SDKRoot = cygpath -w "${{ github.workspace }}/BuildRoot/bootstrap/Library/Developer/Platforms/${{ matrix.os }}.platform/Developer/SDKs/${{ matrix.os }}.sdk"
          foreach ($Module in ("Block", "dispatch", "os", "_foundation_unicode", "_FoundationCShims")) {
            foreach ($ResourceType in ("swift", "swift_static")) {
              $ModuleDirectory = "$SDKRoot\usr\lib\$ResourceType\$Module"
              if (Test-Path $ModuleDirectory) {
                Move-Directory $ModuleDirectory "$SDKRoot\usr\include\"
              }
            }
          }

      - uses: actions/setup-python@v5

      - name: Write SDK Settings
        run: |
          $SDKSettings = @{
            CanonicalName = "${{ matrix.os }}".ToLower()
            DisplayName = "${{ matrix.os }}"
            IsBaseSDK = "YES"
            Version = "${{ inputs.swift_version }}"
            VersionMap = @{}
            HeaderSearchPaths = @( "usr/include" )
            LibrarySearchPaths = @()
            DefaultProperties = @{
              PLATFORM_NAME = "${{ matrix.os }}"
            }
            SupportedTargets = @{
              "${{ matrix.os }}".ToLower() = @{
                PlatformDisplayName = "${{ matrix.os }}"
                PlatformFamilyName = "${{ matrix.os }}"
              }
            }
          }
          switch ("${{ matrix.os }}") {
            "Windows" {
              $SDKSettings.DefaultProperties.DEFAULT_USE_RUNTIME = "MD"
              $SDKSettings.SupportedTargets.windows.LLVMTargetVendor = "unknown"
              $SDKSettings.SupportedTargets.windows.LLVMTargetSys = "windows"
              $SDKSettings.SupportedTargets.windows.LLVMTargetTripleEnvironment = "msvc"
              $SDKSettings.SupportedTargets.windows.Archs = @("${{ matrix.cpu }}")
            }
            default {
              throw "Unsupported OS: ${{ matrix.os }}"
            }
          }
          New-Item -ItemType Directory -Path "${{ github.workspace }}/BuildRoot/bootstrap/Library/Developer/Platforms/${{ matrix.os }}.platform/Developer/SDKs/${{ matrix.os }}.sdk" -Force | Out-Null
          $SDKSettings | ConvertTo-JSON | Out-File -FilePath "${{ github.workspace }}/BuildRoot/bootstrap/Library/Developer/Platforms/${{ matrix.os }}.platform/Developer/SDKs/${{ matrix.os }}.sdk/SDKSettings.json"

          $PListFile = "${{ github.workspace }}/BuildRoot/bootstrap/Library/Developer/Platforms/${{ matrix.os }}.platform/Developer/SDKs/${{ matrix.os }}.sdk/SDKSettings.plist"
          Invoke-Program python3 -c "import plistlib; print(str(plistlib.dumps($(($SDKSettings | ConvertTo-JSON -Compress) -replace '"', "'")), encoding='utf-8'))" `
            -OutFile $PListFile

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-${{ matrix.arch }}-bootstrap-sdk
          path: ${{ github.workspace }}/BuildRoot/bootstrap/Library/Developer/Platforms/${{ matrix.os }}.platform

      - name: Save CAS
        uses: ./SourceCache/ci-build/.github/actions/save-cas
        with:
          s3-bucket: ${{ vars.SCCACHE_S3_BUCKET }}
          aws-region: ${{ vars.SCCACHE_AWS_REGION }}
          aws-arn: ${{ vars.SCCACHE_AWS_ARN }}
          cache-key: ${{ matrix.os }}-${{ matrix.arch }}-bootstrap-sdk

  # build.ps1: Build-Compilers Stage1Compilers
  stage1-compiler:
    needs: [stage0-libxml2, cmark_gfm, build_tools, early_swift_driver]
    runs-on: ${{ inputs.compilers_build_runner }}

    name: ${{ inputs.build_os }} ${{ inputs.build_arch }} Stage1 Compiler

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          ref: ${{ inputs.ci_build_revision }}
          path: ${{ github.workspace }}/SourceCache/ci-build
          show-progress: false
      - uses: ./SourceCache/ci-build/.github/actions/setup-build
        with:
          setup-vs-dev-env: ${{ inputs.build_os == 'Windows' }}
          host-arch: ${{ inputs.build_arch }}

      - name: Restore CAS
        uses: ./SourceCache/ci-build/.github/actions/restore-cas
        if: ${{ !inputs.use_host_toolchain }}
        with:
          s3-bucket: ${{ vars.SCCACHE_S3_BUCKET }}
          aws-region: ${{ vars.SCCACHE_AWS_REGION }}
          aws-arn: ${{ vars.SCCACHE_AWS_ARN }}
          cache-key: ${{ matrix.os }}-${{ matrix.arch }}-stage1-compiler

      - name: Download Compiler
        uses: thebrowsercompany/gha-download-tar-artifact@59992d91335d4ecba543c8535f7d07238e42125d # main
        with:
          name: ${{ matrix.os }}-${{ matrix.arch }}-stage0-compiler
          path: ${{ github.workspace }}/BinaryCache/stage0/Library
      - uses: thebrowsercompany/gha-download-tar-artifact@59992d91335d4ecba543c8535f7d07238e42125d # main
        with:
          name: ${{ matrix.os }}-${{ matrix.arch }}-build-tools
          path: ${{ github.workspace }}/BinaryCache/BuildTools/bin
      - uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.os }}-${{ matrix.arch }}-stage0-libxml2-${{ inputs.libxml2_version }}
          path: ${{ github.workspace }}/BinaryCache/Library/stage0-libxml2-${{ inputs.libxml2_version }}/usr
      - uses: thebrowsercompany/gha-download-tar-artifact@59992d91335d4ecba543c8535f7d07238e42125d # main
        with:
          name: ${{ matrix.os }}-${{ matrix.arch }}-cmark-gfm-${{ inputs.swift_cmark_version }}
          path: ${{ github.workspace }}/BinaryCache/Library/cmark-gfm-${{ inputs.swift_cmark_version }}/usr
      - uses: thebrowsercompany/gha-download-tar-artifact@59992d91335d4ecba543c8535f7d07238e42125d # main
        with:
          name: ${{ matrix.os }}-${{ matrix.arch }}-early-swift-driver
          path: ${{ github.workspace }}/BinaryCache/swift-driver
      - uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.os }}-${{ matrix.arch }}-bootstrap-sdk
          path: ${{ github.workspace }}/BinaryCache/bootstrap/Library/Developer/Platforms/${{ matrix.os }}.platform

      - uses: actions/checkout@v4.2.2
        with:
          repository: swiftlang/llvm-project
          ref: ${{ inputs.llvm_project_revision }}
          path: ${{ github.workspace }}/SourceCache/llvm-project
          show-progress: false
      - uses: actions/checkout@v4.2.2
        with:
          repository: swiftlang/swift
          ref: ${{ inputs.swift_revision }}
          path: ${{ github.workspace }}/SourceCache/swift
          show-progress: false
      - uses: actions/checkout@v4.2.2
        with:
          repository: swiftlang/swift-experimental-string-processing
          ref: ${{ inputs.swift_experimental_string_processing_revision }}
          path: ${{ github.workspace }}/SourceCache/swift-experimental-string-processing
          show-progress: false
      - uses: actions/checkout@v4.2.2
        with:
          repository: swiftlang/swift-syntax
          ref: ${{ inputs.swift_syntax_revision }}
          path: ${{ github.workspace }}/SourceCache/swift-syntax
          show-progress: false
      - uses: actions/checkout@v4.2.2
        with:
          repository: apple/swift-corelibs-libdispatch
          ref: ${{ inputs.swift_corelibs_libdispatch_revision }}
          path: ${{ github.workspace }}/SourceCache/swift-corelibs-libdispatch
          show-progress: false

      - uses: actions/setup-python@v5
        id: python
        with:
          python-version: ${{ inputs.python_version }}
          architecture: x64 # FIXME(#1004): Remove workaround installing x64 Python on ARM64 CI hosts

      - name: Download and expand Python
        env:
          INPUT_PYTHON_DOWNLOAD_LOCATIONS: ${{ inputs.python_download_locations }}
          INPUT_PYTHON_VERSION: ${{ inputs.python_version }}
        run: |
          function DownloadAndVerify($URL, $Destination, $Hash) {
            New-Item -ItemType Directory (Split-Path -Path $Destination -Parent) -ErrorAction Ignore | Out-Null
            $WebClient = New-Object Net.WebClient
            $WebClient.DownloadFile($URL, $Destination)
            $ExpectedHash = $Hash.ToUpperInvariant()
            $SHA256 = (Get-FileHash -Path $Destination -Algorithm SHA256).Hash.ToUpperInvariant()
            if ($SHA256 -ne $ExpectedHash) {
              throw "SHA256 mismatch ($SHA256 vs $Hash) for $URL"
            }
          }

          $KnownPythons = $env:INPUT_PYTHON_DOWNLOAD_LOCATIONS | ConvertFrom-Json
          $version = $env:INPUT_PYTHON_VERSION
          $archKey = "${{ inputs.build_arch }}".ToUpper()
          $pythonInfo = $KnownPythons."$version"."$archKey"
          if ($null -eq $pythonInfo) {
            throw "No python download info for version $version and architecture $archKey"
          }
          Write-Host "Downloading Python $version for $archKey"

          # Download the Python package
          $packagePath = "${{ github.workspace }}\BinaryCache\Python-$archKey-$version.zip"
          DownloadAndVerify -URL $pythonInfo.URL -Destination $packagePath -Hash $pythonInfo.SHA256
          Write-Host "Downloaded Python $version for $archKey to $packagePath"

          # Extract the Python package
          $extractRoot = "${{ github.workspace }}\BuildRoot\Library\Developer\Python-$archKey-$version"
          New-Item -ItemType Directory -Path $extractRoot -ErrorAction Ignore | Out-Null
          Expand-Archive -Path $packagePath -DestinationPath $extractRoot -Force
          Write-Host "Extracted Python $version for $archKey to $extractRoot"

          # Export Python Location
          echo "PYTHON_LOCATION=$extractRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Setup context
        id: setup-context
        env:
          INPUT_PYTHON_VERSION: ${{ inputs.python_version }}
        run: |
          $PythonVersion = $env:INPUT_PYTHON_VERSION
          $PythonMajor = ([System.Version]$PythonVersion).Major
          $PythonMinor = ([System.Version]$PythonVersion).Minor

          $CLANG_LOCATION = cygpath -m $(Split-Path (Get-Command swiftc).Source)
          $LIBPYTHON_PATH = "${env:PYTHON_LOCATION}/tools/libs/python${PythonMajor}${PythonMinor}.lib"
          $PYTHON_INCLUDE_DIR = "${env:PYTHON_LOCATION}/tools/include"
          $PYTHON_BINARY = "python.exe"

          # build.ps1: Get-PinnedToolchainRuntime
          $PinnedRuntimeDir = Get-ChildItem -Path "${env:LOCALAPPDATA}\Programs\Swift\Runtimes" -Directory |
            Sort-Object Name -Descending | Select-Object -First 1
          if (-not $PinnedRuntimeDir) {
            throw "Could not locate pinned toolchain runtime under ${env:LOCALAPPDATA}\Programs\Swift\Runtimes"
          }
          $PINNED_RUNTIME_BIN = Join-Path $PinnedRuntimeDir.FullName "usr\bin"

          $Cpu = switch ("${{ inputs.build_arch }}") {
            "amd64" { "x86_64" }
            "arm64" { "aarch64" }
            default { throw "Unsupported build_arch: ${{ inputs.build_arch }}" }
          }
          $Triple = "$Cpu-unknown-windows-msvc"

          $RamBytes = (Get-CimInstance -ClassName Win32_ComputerSystem).TotalPhysicalMemory
          $RamGB = [math]::Round($RamBytes / 1GB)
          $LinkJobs = [math]::Max(2, [math]::Floor($RamGB / 24))

          $Context = @"
          clang-location=${CLANG_LOCATION}
          libpython-path=${LIBPYTHON_PATH}
          python-include-dir=${PYTHON_INCLUDE_DIR}
          python-binary=${PYTHON_BINARY}
          pinned-runtime-bin=${PINNED_RUNTIME_BIN}
          cpu=${Cpu}
          triple=${Triple}
          link-jobs=${LinkJobs}
          "@
          Write-Output $Context | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Configure Stage1 Compiler
        uses: ./SourceCache/ci-build/.github/actions/configure-cmake-project
        with:
          project-name: Stage1 Compiler
          swift-version: ${{ inputs.swift_version }}
          enable-caching: false
          enable-cas: true
          debug-info: ${{ inputs.debug_info }}
          build-os: ${{ inputs.build_os }}
          build-arch: ${{ inputs.build_arch }}
          os: ${{ inputs.build_os }}
          arch: ${{ inputs.build_arch }}
          src-dir: ${{ github.workspace }}/SourceCache/llvm-project/llvm
          bin-dir: ${{ github.workspace }}/BinaryCache/stage1/build
          install-dir: ${{ github.workspace }}/BinaryCache/stage1/Library/Developer/Toolchains/${{ inputs.swift_version }}+Asserts/usr
          swift-sdk-path: ${{ github.workspace }}/BinaryCache/bootstrap/Library/Developer/Platforms/${{ inputs.build_os }}.platform/Developer/SDKs/${{ inputs.build_os }}.sdk
          c-compiler: '$Compilers.Stage0.C'
          cxx-compiler: '$Compilers.Stage0.CXX'
          swift-compiler: '$Compilers.Stage0.Swift'
          cache-script: ${{ github.workspace }}/SourceCache/swift/cmake/caches/Windows-Bootstrap-Stage1-${{ steps.setup-context.outputs.cpu }}.cmake
          cmake-defines: |
            @{
              'SWIFT_BUILD_DYNAMIC_SDK_OVERLAY' = "NO";
              'SWIFT_BUILD_DYNAMIC_STDLIB' = "NO";
              'SWIFT_BUILD_LIBEXEC' = "NO";
              'SWIFT_BUILD_REMOTE_MIRROR' = "NO";
              'SWIFT_NATIVE_SWIFT_TOOLS_PATH' = "${{ github.workspace }}/BinaryCache/BuildTools/bin";

              'CLANG_TABLEGEN' = "${{ github.workspace }}/BinaryCache/BuildTools/bin/clang-tblgen${ExeSuffix}";
              'CLANG_TIDY_CONFUSABLE_CHARS_GEN' = "${{ github.workspace }}/BinaryCache/BuildTools/bin/clang-tidy-confusable-chars-gen${ExeSuffix}";
              'CMAKE_STATIC_LIBRARY_PREFIX_Swift' = "lib";
              'LibXml2_DIR' = "${{ github.workspace }}/BinaryCache/Library/stage0-libxml2-${{ inputs.libxml2_version }}/usr/lib/cmake/libxml2-${{ inputs.libxml2_version }}";
              'LLDB_LIBXML2_VERSION' = "${{ inputs.libxml2_version }}";
              'LLDB_PYTHON_EXE_RELATIVE_PATH' = "${{ steps.setup-context.outputs.python-binary }}";
              'LLDB_PYTHON_EXT_SUFFIX' = ".pyd";
              'LLDB_PYTHON_RELATIVE_PATH' = "lib/site-packages";
              'LLDB_PYTHON_DLL_RELATIVE_PATH' = "../../../../Python-${{ inputs.python_version }}/usr/bin";
              'LLDB_TABLEGEN' = "${{ github.workspace }}/BinaryCache/BuildTools/bin/lldb-tblgen${ExeSuffix}";
              'LLVM_CONFIG_PATH' = "${{ github.workspace }}/BinaryCache/BuildTools/bin/llvm-config${ExeSuffix}";
              'LLVM_ENABLE_ASSERTIONS' = "YES";
              'LLVM_ENABLE_LLD' = "YES";
              'LLVM_EXTERNAL_SWIFT_SOURCE_DIR' = "${{ github.workspace }}/SourceCache/swift";
              'LLVM_HOST_TRIPLE' = "${{ steps.setup-context.outputs.triple }}";
              'LLVM_NATIVE_TOOL_DIR' = "${{ github.workspace }}/BinaryCache/BuildTools/bin";
              'LLVM_TABLEGEN' = "${{ github.workspace }}/BinaryCache/BuildTools/bin/llvm-tblgen${ExeSuffix}";
              'LLVM_USE_HOST_TOOLS' = "NO";
              'Python3_EXECUTABLE' = "${{ steps.python.outputs.python-path }}";
              'Python3_INCLUDE_DIR' = "${{ steps.setup-context.outputs.python-include-dir }}";
              'Python3_LIBRARY' = "${{ steps.setup-context.outputs.libpython-path }}";
              'Python3_ROOT_DIR' = $env:pythonLocation;
              'Python3_VERSION' = "${{ inputs.python_version }}";
              'SWIFT_TOOLCHAIN_VERSION' = "${{ inputs.swift_version }} ${{ inputs.swift_tag }}";
              'SWIFT_BUILD_SWIFT_SYNTAX' = "YES";
              'SWIFT_CLANG_LOCATION' = "${{ steps.setup-context.outputs.clang-location }}";
              'SWIFT_EARLY_SWIFT_DRIVER_BUILD' = "${{ github.workspace }}/BinaryCache/swift-driver/bin";
              'SWIFT_ENABLE_EXPERIMENTAL_CONCURRENCY' = "YES";
              'SWIFT_ENABLE_EXPERIMENTAL_CXX_INTEROP' = "YES";
              'SWIFT_ENABLE_EXPERIMENTAL_DIFFERENTIABLE_PROGRAMMING' = "YES";
              'SWIFT_ENABLE_EXPERIMENTAL_DISTRIBUTED' = "YES";
              'SWIFT_ENABLE_EXPERIMENTAL_OBSERVATION' = "YES";
              'SWIFT_ENABLE_EXPERIMENTAL_STRING_PROCESSING' = "YES";
              'SWIFT_ENABLE_RUNTIME_MODULE' = "YES";
              'SWIFT_ENABLE_BACKTRACING' = "YES";
              'SWIFT_ENABLE_SYNCHRONIZATION' = "YES";
              'SWIFT_ENABLE_VOLATILE' = "YES";
              'SWIFT_PATH_TO_LIBDISPATCH_SOURCE' = "${{ github.workspace }}/SourceCache/swift-corelibs-libdispatch";
              'SWIFT_PATH_TO_STRING_PROCESSING_SOURCE' = "${{ github.workspace }}/SourceCache/swift-experimental-string-processing";
              'SWIFT_PATH_TO_SWIFT_SDK' = "${{ github.workspace }}/BuildRoot/bootstrap/Library/Developer/Platforms/${{ matrix.os }}.platform/Developer/SDKs/${{ matrix.os }}.sdk/usr";
              'SWIFT_PATH_TO_SWIFT_SYNTAX_SOURCE' = "${{ github.workspace }}/SourceCache/swift-syntax";
              'SWIFT_STDLIB_ASSERTIONS' = "NO";
              'SWIFTSYNTAX_ENABLE_ASSERTIONS' = "NO";
              'cmark-gfm_DIR' = "${{ github.workspace }}/BinaryCache/Library/cmark-gfm-${{ inputs.swift_cmark_version }}/usr/lib/cmake";

              'LLVM_PARALLEL_LINK_JOBS' = "${{ steps.setup-context.outputs.link-jobs }}";
              'SWIFT_PARALLEL_LINK_JOBS' = "${{ steps.setup-context.outputs.link-jobs }}";
            }

      - name: Build Stage1 Compiler Distribution
        run: cmake --build ${{ github.workspace }}/BinaryCache/stage1/build --target distribution

      - name: Install Stage1 Compiler Distribution
        run: cmake --build ${{ github.workspace }}/BinaryCache/stage1/build --target install-distribution-stripped

      - name: Copy cmark-gfm shared libraries
        run: |
          Copy-Item -Path "${{ github.workspace }}/BinaryCache/Library/cmark-gfm-${{ inputs.swift_cmark_version }}/usr/bin/*.dll" -Destination "${{ github.workspace }}/BinaryCache/stage1/Library/Developer/Toolchains/${{ inputs.swift_version }}+Asserts/usr/bin"

      # build.ps1: Copy-WindowsRuntimeToToolchain
      - name: Copy Windows Runtime to Toolchain
        run: |
          $Stage1Bin = "${{ github.workspace }}/BinaryCache/stage1/Library/Developer/Toolchains/${{ inputs.swift_version }}+Asserts/usr/bin"
          New-Item -ItemType Directory -Path $Stage1Bin -Force | Out-Null
          $RuntimeFiles = @(Get-ChildItem -Path "${{ steps.setup-context.outputs.pinned-runtime-bin }}" -File | Sort-Object Name)
          if (-not ($RuntimeFiles | Where-Object { $_.Extension -ieq ".dll" })) {
            throw "No DLLs found under '${{ steps.setup-context.outputs.pinned-runtime-bin }}'"
          }
          foreach ($File in $RuntimeFiles) {
            Copy-Item -Force -Path $File.FullName -Destination $Stage1Bin
          }

      - name: Upload Stage1 Compiler
        uses: thebrowsercompany/gha-upload-tar-artifact@e18c33b1cd416d0d96a91dc6dce06219f98e4e27 # main
        with:
          name: ${{ inputs.build_os }}-${{ inputs.build_arch }}-stage1-compiler
          path: ${{ github.workspace }}/BinaryCache/stage1/Library

      - name: Extract Stage1 swift-syntax
        run: |
          New-Item -Path ${{ github.workspace }}/BinaryCache/stage1/swift-syntax/lib/swift/host -ItemType Directory | Out-Null
          $ToolchainRoot = "${{ github.workspace }}/BuildRoot/stage1/Library/Developer/Toolchains/${{ inputs.swift_version }}+${{ matrix.variant }}"
          if ("${{ matrix.os }}" -eq "Windows") {
            $bindir = cygpath -m "${{ github.workspace }}/BinaryCache/stage1"
            Copy-Item -Path "${ToolchainRoot}/usr/lib/*.lib" -Destination "${{ github.workspace }}/BinaryCache/swift-syntax/lib"
            Copy-Item -Path "${ToolchainRoot}/usr/lib/*.lib" -Destination "${{ github.workspace }}/BinaryCache/swift-syntax/lib/swift/host"
          } else {
            $bindir = "${{ github.workspace }}/BinaryCache/stage1"
            Copy-Item -Path "${ToolchainRoot}/usr/lib/*.dylib" -Destination "${{ github.workspace }}/BinaryCache/swift-syntax/lib"
            Copy-Item -Path "${ToolchainRoot}/usr/lib/swift/host/*.dylib" -Destination "${{ github.workspace }}/BinaryCache/swift-syntax/lib/swift/host"
          }
          Copy-Item -Path "${ToolchainRoot}/usr/lib/swift/host/*.swiftmodule" -Destination "${{ github.workspace }}/BinaryCache/swift-syntax/lib/swift/host" -Recurse

          $module = "${{ github.workspace }}/BinaryCache/stage1/cmake/modules/SwiftSyntaxConfig.cmake"
          (Get-Content $module).Replace("${bindir}", '<BINARY_DIR>') | Set-Content $module
          New-Item -Path ${{ github.workspace }}/BinaryCache/stage1/swift-syntax/cmake/modules -ItemType Directory | Out-Null
          Copy-Item -Path $module -Destination "${{ github.workspace }}/BinaryCache/stage1/swift-syntax/cmake/modules"

      - name: Upload Stage1 swift-syntax
        uses: thebrowsercompany/gha-upload-tar-artifact@e18c33b1cd416d0d96a91dc6dce06219f98e4e27 # main
        with:
          name: ${{ matrix.os }}-${{ matrix.arch }}-stage1-swift-syntax
          path: ${{ github.workspace }}/BinaryCache/stage1/swift-syntax

      - name: Save CAS
        uses: ./SourceCache/ci-build/.github/actions/save-cas
        with:
          s3-bucket: ${{ vars.SCCACHE_S3_BUCKET }}
          aws-region: ${{ vars.SCCACHE_AWS_REGION }}
          aws-arn: ${{ vars.SCCACHE_AWS_ARN }}
          cache-key: ${{ inputs.build_os }}-${{ inputs.build_arch }}-stage1-compiler

  bootstrap-macros:
    # TODO: Build this on macOS or make an equivalent Mac-only job
    if: inputs.build_os == 'Windows'
    needs: [stage1-compiler]
    runs-on: ${{ inputs.default_build_runner }}

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(inputs.build_matrix) }}

    name: Windows ${{ matrix.arch }} Bootstrap Macros

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          ref: ${{ inputs.ci_build_revision }}
          path: ${{ github.workspace }}/SourceCache/ci-build
          show-progress: false
      - uses: ./SourceCache/ci-build/.github/actions/setup-build
        with:
          setup-vs-dev-env: true
          host-arch: ${{ matrix.arch }}

      - name: Download Stage0 Compiler
        uses: thebrowsercompany/gha-download-tar-artifact@59992d91335d4ecba543c8535f7d07238e42125d # main
        with:
          name: Windows-${{ inputs.build_arch }}-stage0-compiler
          path: ${{ github.workspace }}/BinaryCache/stage0/Library
      - name: Download Stage1 swift-syntax
        uses: thebrowsercompany/gha-download-tar-artifact@59992d91335d4ecba543c8535f7d07238e42125d # main
        with:
          name: Windows-${{ matrix.arch }}-stage1-swift-syntax
          path: ${{ github.workspace }}/BinaryCache/stage1/swift-syntax
      - name: Download Bootstrap SDK
        uses: actions/download-artifact@v4
        with:
          name: Windows-${{ inputs.build_arch }}-bootstrap-sdk
          path: ${{ github.workspace }}/BinaryCache/bootstrap/Library/Developer/Platforms/Windows.platform

      - uses: actions/checkout@v4.2.2
        with:
          repository: swiftlang/swift
          ref: ${{ inputs.swift_revision }}
          path: ${{ github.workspace }}/SourceCache/swift
          show-progress: false
      - uses: actions/checkout@v4.2.2
        with:
          repository: apple/swift-foundation
          ref: ${{ inputs.swift_foundation_revision }}
          path: ${{ github.workspace }}/SourceCache/swift-foundation
          show-progress: false
      - uses: actions/checkout@v4.2.2
        with:
          repository: swiftlang/swift-testing
          ref: ${{ inputs.swift_testing_revision }}
          path: ${{ github.workspace }}/SourceCache/swift-testing
          show-progress: false

      - run: |
          $RTLPath = cygpath -w ${{ github.workspace }}/BinaryCache/bootstrap/Library/Developer/Platforms/Windows.platform/Developer/SDKs/Windows.sdk/usr/bin
          echo ${RTLPath} | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Extract swift-syntax
        run: |
          $module = "${{ github.workspace }}/BinaryCache/stage1/swift-syntax/cmake/modules/SwiftSyntaxConfig.cmake"
          $bindir = cygpath -m ${{ github.workspace }}/BinaryCache/stage1/swift-syntax
          (Get-Content $module).Replace('<BINARY_DIR>', "${bindir}") | Set-Content $module

      # build.ps1: Build-BootstrapFoundationMacros
      - name: Configure Bootstrap Foundation Macros
        uses: ./SourceCache/ci-build/.github/actions/configure-cmake-project
        with: 
          project-name: Bootstrap Foundation Macros
          swift-version: ${{ inputs.swift_version }}
          enable-caching: false
          enable-cas: true
          debug-info: ${{ inputs.debug_info }}
          build-os: ${{ inputs.build_os }}
          build-arch: ${{ inputs.build_arch }}
          os: ${{ matrix.os }}
          arch: ${{ matrix.arch }}
          src-dir: ${{ github.workspace }}/SourceCache/swift-foundation/Sources/FoundationMacros
          bin-dir: ${{ github.workspace }}/BinaryCache/bootstrap/swift-foundation-macros
          install-dir: ${{ github.workspace }}/BuildRoot/bootstrap/Library/Developer/Toolchains/${{ inputs.swift_version }}+Asserts/usr
          swift-sdk-path: ${{ github.workspace }}/BinaryCache/bootstrap/Library/Developer/Platforms/${{ matrix.os }}.platform/Developer/SDKs/${{ matrix.os }}.sdk
          swift-compiler: '$Compilers.Stage0.Swift'
          cmake-defines: |
            @{
              'SwiftSyntax_DIR' = "${{ github.workspace }}/BinaryCache/stage1/swift-syntax/cmake/modules";
            }

      - name: Build Bootstrap Foundation Macros
        run: cmake --build ${{ github.workspace }}/BinaryCache/bootstrap/swift-foundation-macros

      # build.ps1: Build-BootstrapTestingMacros
      - name: Configure Bootstrap Testing Macros
        uses: ./SourceCache/ci-build/.github/actions/configure-cmake-project
        with: 
          project-name: Bootstrap Testing Macros
          swift-version: ${{ inputs.swift_version }}
          enable-caching: false
          enable-cas: true
          debug-info: ${{ inputs.debug_info }}
          build-os: ${{ inputs.build_os }}
          build-arch: ${{ inputs.build_arch }}
          os: ${{ matrix.os }}
          arch: ${{ matrix.arch }}
          src-dir: ${{ github.workspace }}/SourceCache/swift-testing/Sources/TestingMacros
          bin-dir: ${{ github.workspace }}/BinaryCache/bootstrap/swift-testing-macros
          install-dir: ${{ github.workspace }}/BuildRoot/bootstrap/Library/Developer/Toolchains/${{ inputs.swift_version }}+Asserts/usr
          swift-sdk-path: ${{ github.workspace }}/BinaryCache/bootstrap/Library/Developer/Platforms/${{ matrix.os }}.platform/Developer/SDKs/${{ matrix.os }}.sdk
          swift-compiler: '$Compilers.Stage0.Swift'
          cmake-defines: |
            @{
              'SwiftSyntax_DIR' = "${{ github.workspace }}/BinaryCache/stage1/swift-syntax/cmake/modules";
            }

      - name: Build Bootstrap Testing Macros
        run: cmake --build ${{ github.workspace }}/BinaryCache/bootstrap/swift-testing-macros

      - name: Install Bootstrap Foundation Macros
        run: cmake --build ${{ github.workspace }}/BinaryCache/bootstrap/swift-foundation-macros --target install
      - name: Install Bootstrap Testing Macros
        run: cmake --build ${{ github.workspace }}/BinaryCache/bootstrap/swift-testing-macros --target install

      - name: Upload Bootstrap Macros
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-${{ matrix.arch }}-bootstrap-macros
          path: ${{ github.workspace }}/BuildRoot/bootstrap/Library

  sqlite:
    needs: [stage1-compiler]
    runs-on: ${{ inputs.default_build_runner }}

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(inputs.host_matrix) }}

    name: ${{ matrix.os }} ${{ matrix.arch }} SQLite3

    steps:
